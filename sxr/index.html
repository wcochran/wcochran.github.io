      const r4 = addRow('Full ball trail', -0.134, menuFullTrailOn);
      fullTrailToggleMesh = r4.btn; fullTrailHitTarget = r4.hit;

      scene.object3D.add(arMenuGroup);

      // ── Controller laser pointers ──────────────────────────────────────────
      for (let i = 0; i < 2; i++) {
        const ctrl = scene.renderer.xr.getController(i);
        ctrl.visible = false;
        const laser = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(0, 0, -3)
          ]),
          new THREE.LineBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0.55, depthTest: false
          })
        );
        laser.renderOrder = 4;
        ctrl.add(laser);
        scene.object3D.add(ctrl);
      }
    }

    // Toggle field contour meshes and update the button texture.
    // Toggles the contour material's own visibility rather than the mesh
    // object's — leftFieldMesh/rightFieldMesh are also the parent of any
    // tennis skeleton/ring overlay, and Object3D.visible=false would hide
    // that too (Three.js skips a whole subtree when a parent isn't visible).
    function doToggle() {
      menuContoursOn = !menuContoursOn;
      if (leftFieldMesh)  leftFieldMesh.material.visible  = menuContoursOn;
      if (rightFieldMesh) rightFieldMesh.material.visible = menuContoursOn;
      updateContoursToggleBtn();
      console.log('[menu] field contours:', menuContoursOn ? 'ON' : 'OFF');
    }

    function updateContoursToggleBtn() {
      if (!contoursToggleMesh) return;
      const old = contoursToggleMesh.material.map;
      contoursToggleMesh.material.map = makeToggleTex(menuContoursOn);
      contoursToggleMesh.material.needsUpdate = true;
      if (old) old.dispose();
    }

    function doBillboardToggle() {
      menuBillboardOn = !menuBillboardOn;
      if (spatialMath) spatialMath.set_billboard(menuBillboardOn);
      updateBillboardToggleBtn();
      console.log('[menu] billboard:', menuBillboardOn ? 'ON' : 'OFF');
    }

    function updateBillboardToggleBtn() {
      if (!billboardToggleMesh) return;
      const old = billboardToggleMesh.material.map;
      billboardToggleMesh.material.map = makeToggleTex(menuBillboardOn);
      billboardToggleMesh.material.needsUpdate = true;
      if (old) old.dispose();
    }

    function doHeightFollowToggle() {
      menuHeightFollowOn = !menuHeightFollowOn;
      if (spatialMath) spatialMath.set_height_follow(menuHeightFollowOn);
      updateHeightFollowToggleBtn();
      console.log('[menu] height follow:', menuHeightFollowOn ? 'ON' : 'OFF');
    }

    function updateHeightFollowToggleBtn() {
      if (!heightFollowToggleMesh) return;
      const old = heightFollowToggleMesh.material.map;
      heightFollowToggleMesh.material.map = makeToggleTex(menuHeightFollowOn);
      heightFollowToggleMesh.material.needsUpdate = true;
      if (old) old.dispose();
    }

    // OFF (default) = comet trail (short trailing tail); ON = persistent
    // per-shot ribbons (each shot draws in and stays, building up rally history).
    function doFullTrailToggle() {
      menuFullTrailOn = !menuFullTrailOn;
      updateFullTrailToggleBtn();
      console.log('[menu] full ball trail:', menuFullTrailOn ? 'ON' : 'OFF');
    }

    function updateFullTrailToggleBtn() {
      if (!fullTrailToggleMesh) return;
      const old = fullTrailToggleMesh.material.map;
      fullTrailToggleMesh.material.map = makeToggleTex(menuFullTrailOn);
      fullTrailToggleMesh.material.needsUpdate = true;
      if (old) old.dispose();
    }

    // Place the menu panel 0.6 m in front of the user, vertical, facing them.
    // Uses yaw-only rotation so the panel stays upright regardless of head tilt.
    function placeMenuAtHead() {
      if (!arMenuGroup) return;
      const xrCam = scene.renderer.xr.getCamera();
      if (!xrCam) return;
      const camPos  = new THREE.Vector3().setFromMatrixPosition(xrCam.matrixWorld);
      const camQuat = new THREE.Quaternion().setFromRotationMatrix(xrCam.matrixWorld);
      const euler   = new THREE.Euler().setFromQuaternion(camQuat, 'YXZ');
      const yawOnly = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, euler.y, 0));

      // Place menu at the video plane distance, just above the screen top.
      // This keeps it in the same depth as the video and avoids it floating in front.
      const MENU_HALF_H = 0.15;  // half of panel H (0.30 m)
      const MARGIN      = 0.05;  // 5 cm gap above screen top
      const reg = selectedExp && regDataMap[selectedExp];
      let menuDist = 0.55;
      let menuY    = 0.32;
      if (reg && regPitch !== null) {
        menuDist = reg.d;
        const screenTopY = -reg.d * Math.sin(regPitch) + reg.qh / 2;
        menuY = screenTopY + MARGIN + MENU_HALF_H;
      }

      const menuPos = camPos.clone().add(
        new THREE.Vector3(0, menuY, -menuDist).applyQuaternion(yawOnly));
      arMenuGroup.position.copy(menuPos);
      arMenuGroup.quaternion.copy(yawOnly);
      arMenuGroup.visible = true;
    }

    // ─── Registration-based quad placement ───────────────────────────────────
    //
    // Computes quad size and pose from a left/right camera JSON pair using the
    // pinhole camera model and venue-to-room scale.
    //
    // Math (all units metres unless noted):
    //   separation  = distance between left/right world_position (feet → metres)
    //   scale       = IPD / separation_metres           (venue → room)
    //   pitch       = asin(-view_dir.z)                 (venue Z is up)
    //   quad height = d * H_eye / fy                    (similar triangles)
    //   quad width  = d * W_eye / fx
    //
    function computeRegData(L, R) {
      const d = parseFloat(new URLSearchParams(location.search).get('d') ?? '1.0');

      const LP = L.world_position, RP = R.world_position;
      const sepFt = Math.hypot(LP[0]-RP[0], LP[1]-RP[1], LP[2]-RP[2]);
      const vz    = (L.world_view_direction[2] + R.world_view_direction[2]) / 2;
      const pitch = Math.asin(-vz);

      // PINHOLE params are [fx, fy, cx, cy]; SIMPLE_RADIAL are [f, cx, cy, k]
      // (single focal, small distortion k ignored for display).
      const focals = c => c.camera_model === 'SIMPLE_RADIAL'
        ? [c.camera_params[0], c.camera_params[0]]
        : [c.camera_params[0], c.camera_params[1]];
      const [Lfx, Lfy] = focals(L), [Rfx, Rfy] = focals(R);
      const fx    = (Lfx + Rfx) / 2;
      const fy    = (Lfy + Rfy) / 2;
      const W_eye = L.img_width;
      const H_eye = L.img_height;
      const qw    = d * W_eye / fx;
      const qh    = d * H_eye / fy;

      const D_m    = sepFt * 0.3048;
      const fopScale = (0.062 / D_m) * 0.3048;

      // Build left FOP camera pose (camera-to-FOP-world, column-major rotation):
      //   Z = -world_view_direction, Y = world_up_direction, X = Y × Z
      function makePose(data) {
        const vd = data.world_view_direction;
        const ud = data.world_up_direction;
        const wp = data.world_position;
        const Zv = new THREE.Vector3(-vd[0], -vd[1], -vd[2]).normalize();
        const Yv = new THREE.Vector3( ud[0],  ud[1],  ud[2]).normalize();
        const Xv = new THREE.Vector3().crossVectors(Yv, Zv).normalize();
        const Yo = new THREE.Vector3().crossVectors(Zv, Xv).normalize();
        return new THREE.Matrix4().set(
          Xv.x, Yo.x, Zv.x, wp[0],
          Xv.y, Yo.y, Zv.y, wp[1],
          Xv.z, Yo.z, Zv.z, wp[2],
          0,    0,    0,    1
        ).invert();
      }

      console.log(`[reg] sep=${sepFt.toFixed(3)} ft  pitch=${(pitch*180/Math.PI).toFixed(2)}°  ` +
                  `quad=${qw.toFixed(4)}×${qh.toFixed(4)} m  fopScale=${fopScale.toFixed(6)}`);

      return { pitch, d, fopScale, invFopL: makePose(L), invFopR: makePose(R), qw, qh };
    }

    // Pre-load registration JSON for both experiences in parallel.
    // Buttons enable once XR is confirmed AND both loads finish.
    const regLoads = Object.entries(EXPERIENCES).map(([key, exp]) =>
      Promise.all([
        fetch(exp.leftJson).then(r => r.json()),
        fetch(exp.rightJson).then(r => r.json())
      ]).then(([L, R]) => {
        regDataMap[key] = computeRegData(L, R);
        console.log(`[reg] loaded: ${key}`);
      }).catch(err => {
        console.warn(`[reg] failed to load ${key} registration:`, err);
      })
    );

    // Apply a pre-computed registration to the active global vars + WASM.
    function applyExperienceReg(key, exp) {
      const reg = regDataMap[key];
      const maskPart   = exp.maskUrl ? `mask: ${exp.maskUrl}; ` : '';
      const layoutPart = `layout: ${exp.layout || 'tb'}; `;
      if (reg) {
        regPitch    = reg.pitch;
        regD        = reg.d;
        regFopScale = reg.fopScale;
        regInvPfopL = reg.invFopL;
        regInvPfopR = reg.invFopR;
        regPending  = {
          scale:   reg.fopScale,
          invFopL: reg.invFopL.elements,
          invFopR: reg.invFopR.elements,
          d:       reg.d
        };
        applyRegistrationToWasm();
        quad.removeAttribute('stereo-tb');
        quad.setAttribute('stereo-tb',
          `src: #video; ${maskPart}${layoutPart}width: ${reg.qw.toFixed(4)}; height: ${reg.qh.toFixed(4)}`);
      } else {
        regPitch = 0;
        quad.removeAttribute('stereo-tb');
        quad.setAttribute('stereo-tb', `src: #video; ${maskPart}${layoutPart}width: 3.0`);
      }
    }

    // Rebuild field contour meshes for the chosen experience, then (if the
    // experience carries match tracking data) parent the skeleton/ring overlay
    // onto those same meshes so it inherits their per-eye warp transform.
    function loadFieldContoursForExp(exp) {
      disposeTennisMatchOverlay();
      // Dispose previous meshes if any
      for (const mesh of [leftFieldMesh, rightFieldMesh]) {
        if (mesh) { scene.object3D.remove(mesh); mesh.geometry.dispose(); }
      }
      leftFieldMesh = rightFieldMesh = null;
      wasmFieldReady = false;
      if (spatialMath) spatialMath.reset();

      buildFieldContours(exp.contoursJson)
        .then(({ geometry, material }) => {
          const previewMat = new THREE.Matrix4().compose(
            FIELD_PREVIEW_POS, FIELD_PREVIEW_QUAT, FIELD_PREVIEW_SCALE);
          leftFieldMesh  = new THREE.Mesh(geometry, material);
          rightFieldMesh = new THREE.Mesh(geometry, material);
          for (const mesh of [leftFieldMesh, rightFieldMesh]) {
            mesh.frustumCulled = false;
            mesh.renderOrder = 1;
            mesh.matrixAutoUpdate = false;
            mesh.layers.set(0);
            mesh.matrix.copy(previewMat);
            mesh.matrixWorldNeedsUpdate = true;
            scene.object3D.add(mesh);
          }
          if (menuContoursOn === false) {
            leftFieldMesh.material.visible = rightFieldMesh.material.visible = false;
          }
          console.log(`[field] contours loaded: ${exp.contoursJson}`);
          if (exp.matchDataUrl) return loadTennisMatchOverlay(exp.matchDataUrl);
        })
        .catch(e => console.error('[field] failed:', e));
    }

    // ── Experience selection ───────────────────────────────────────────────────

    async function selectAndEnterAR(key) {
      const exp = EXPERIENCES[key];
      selectedExp = key;

      expButtons.forEach(b => { b.disabled = true; });
      statusEl.textContent = '';

      // Switch video source — HLS (.m3u8) streams go through hls.js since
      // Chrome has no native HLS <video> support.
      if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
      if (/\.m3u8(\?|$)/.test(exp.videoUrl) && window.Hls && Hls.isSupported()) {
        hlsPlayer = new Hls();
        hlsPlayer.on(Hls.Events.ERROR, (_, data) =>
          console.error('[hls]', data.type, data.details, data.fatal ? '(fatal)' : ''));
        hlsPlayer.loadSource(exp.videoUrl);
        hlsPlayer.attachMedia(video);
      } else {
        video.src = exp.videoUrl;
        video.load();
      }

      // Apply registration + stereo-tb component
      applyExperienceReg(key, exp);

      // Load contours (and, if present, the match-data overlay) for this sport
      loadFieldContoursForExp(exp);

      video.play().catch(e => console.warn('[video]', e));

      try {
        await (scene.enterAR ? scene.enterAR() : scene.enterVR());
      } catch (e) {
        console.error('[ar] session failed:', e);
        statusEl.textContent = `Failed: ${e.message} — try again`;
        updateButtonState();
      }
    }

    expButtons.forEach(b =>
      b.addEventListener('click', () => selectAndEnterAR(b.dataset.exp)));

    // Place the screen once in world space at AR session start using the
    // actual head pose sampled from the first XR animation frame.
    function placeScreenAtHead() {
      if (regPitch === null) {
        console.warn('[reg] registration not loaded yet, using default placement');
        regPitch = 0;
      }

      const camPos  = new THREE.Vector3();
      const camQuat = new THREE.Quaternion();

      // Read position/orientation directly from matrixWorld — avoids the scene-graph
      // traversal that getWorldPosition() does, which can silently return (0,0,0)
      // when the XR camera is not parented into the Three.js scene graph.
      const xrCam = scene.renderer.xr.getCamera();
      if (xrCam && xrCam.matrixWorld) {
        camPos.setFromMatrixPosition(xrCam.matrixWorld);
        camQuat.setFromRotationMatrix(xrCam.matrixWorld);
      } else {
        // Fallback: A-Frame's camera entity IS in the scene graph
        const cameraEl = document.querySelector('[camera]');
        if (cameraEl && cameraEl.object3D) {
          cameraEl.object3D.getWorldPosition(camPos);
          cameraEl.object3D.getWorldQuaternion(camQuat);
        } else {
          console.error('[reg] no camera available — retrying');
          setTimeout(placeScreenAtHead, 100);
          return;
        }
      }
      console.log(`[reg] head pose: (${camPos.x.toFixed(3)}, ${camPos.y.toFixed(3)}, ${camPos.z.toFixed(3)})`);

      // Use only the yaw component so the screen faces wherever the user is
      // looking horizontally, ignoring head tilt / roll.
      const euler   = new THREE.Euler().setFromQuaternion(camQuat, 'YXZ');
      const yawQuat = new THREE.Quaternion()
                        .setFromEuler(new THREE.Euler(0, euler.y, 0));

      // Offset from eye: d metres forward + pitched down by regPitch.
      // = Ry(yaw) * [0, -d·sin(p), -d·cos(p)]
      const localOffset = new THREE.Vector3(
        0,
        -regD * Math.sin(regPitch),
        -regD * Math.cos(regPitch)
      ).applyQuaternion(yawQuat);

      const screenPos = camPos.clone().add(localOffset);

      // Screen faces the viewer: yaw to match heading, then pitch tilt.
      const pitchQuat  = new THREE.Quaternion()
                           .setFromAxisAngle(new THREE.Vector3(1, 0, 0), -regPitch);
      const screenQuat = yawQuat.clone().multiply(pitchQuat);

      quad.object3D.position.copy(screenPos);
      quad.object3D.quaternion.copy(screenQuat);

      console.log(`[reg] screen placed at (${screenPos.x.toFixed(3)}, ` +
                  `${screenPos.y.toFixed(3)}, ${screenPos.z.toFixed(3)})`);

      // Hand the placement to the WASM module.  From here on, updateFromWasm()
      // computes M_l / M_r every frame and writes the results back to the meshes.
      if (spatialMath && leftFieldMesh && rightFieldMesh) {
        spatialMath.place_screen(
          screenPos.x, screenPos.y, screenPos.z,
          screenQuat.x, screenQuat.y, screenQuat.z, screenQuat.w,
          camPos.x, camPos.y, camPos.z,
          regPitch
        );
        const isStereo = xrCam.cameras && xrCam.cameras.length >= 2;
        // traverse (not just the top mesh) so any parented skeleton/ring
        // overlay content gets the same per-eye layer — layers are per-object
        // in Three.js, not inherited from a parent.
        leftFieldMesh.traverse(o  => { if (o.isMesh) o.layers.set(isStereo ? 1 : 0); });
        rightFieldMesh.traverse(o => { if (o.isMesh) o.layers.set(isStereo ? 2 : 31); });
        wasmFieldReady = true;
        console.log('[wasm] place_screen called — per-eye tracking enabled');
      } else {
        console.warn('[wasm] spatial_math not ready at placement time — contours inactive');
      }
    }

    // Build AR menu once the scene is ready (no field contours yet — loaded on experience select).
    scene.addEventListener('loaded', () => {
      buildArMenu();
    }, { once: true });

    // Buttons enable once AR is confirmed supported AND all reg JSONs are loaded.
    let arSupported = false;
    let regsLoaded  = false;

    function updateButtonState() {
      if (arSupported && regsLoaded) {
        expButtons.forEach(b => { b.disabled = false; });
        statusEl.textContent = 'Choose an experience above.';
      }
    }

    // Check immersive-ar support
    if (!navigator.xr) {
      statusEl.textContent = 'WebXR not supported by this browser.';
    } else {
      navigator.xr.isSessionSupported('immersive-ar').then(ok => {
        if (ok) {
          arSupported = true;
          updateButtonState();
        } else {
          expButtons.forEach(b => { b.textContent = 'AR not supported'; });
          statusEl.textContent = 'immersive-ar not available on this device/browser.';
        }
      }).catch(() => {
        statusEl.textContent = 'Error checking XR support.';
      });
    }

    // Enable buttons once registration data for both experiences is ready.
    Promise.all(regLoads).then(() => {
      regsLoaded = true;
      updateButtonState();
    });

    exitBtn.addEventListener('click', () => scene.exitVR());

    scene.addEventListener('enter-vr', () => {
      console.log('[ar] enter-vr fired');
      overlay.style.display = 'none';
      exitBtn.style.display = 'block';
      video.play().catch(e => console.warn('[video] play failed:', e));
      setTimeout(() => {
        placeScreenAtHead();
        placeMenuAtHead();
      }, 300);

      // Menu interaction on XR select (controller trigger, hand pinch, or screen tap).
      // Tries each controller's pointing ray first; falls back to head gaze.
      xrSelectHandler = () => {
        if (!arMenuGroup || !arMenuGroup.visible) return;
        const rc = new THREE.Raycaster(); rc.near = 0.01; rc.far = 10;

        // Controller rays — the visible laser shows where each ray points
        for (let i = 0; i < 2; i++) {
          const ctrl = scene.renderer.xr.getController(i);
          if (!ctrl.visible) continue;
          rc.set(
            new THREE.Vector3().setFromMatrixPosition(ctrl.matrixWorld),
            new THREE.Vector3(0, 0, -1).transformDirection(ctrl.matrixWorld).normalize()
          );
          if (rc.intersectObject(contoursHitTarget).length > 0) { doToggle(); return; }
          if (billboardHitTarget && rc.intersectObject(billboardHitTarget).length > 0) { doBillboardToggle(); return; }
          if (heightFollowHitTarget && rc.intersectObject(heightFollowHitTarget).length > 0) { doHeightFollowToggle(); return; }
          if (fullTrailHitTarget && rc.intersectObject(fullTrailHitTarget).length > 0) { doFullTrailToggle(); return; }
        }

        // Gaze fallback (head -Z direction) for hand tracking / no controllers
        const xrCam = scene.renderer.xr.getCamera();
        if (!xrCam) return;
        rc.set(
          new THREE.Vector3().setFromMatrixPosition(xrCam.matrixWorld),
          new THREE.Vector3(0, 0, -1).transformDirection(xrCam.matrixWorld).normalize()
        );
        if (rc.intersectObject(contoursHitTarget).length > 0) { doToggle(); }
        else if (billboardHitTarget && rc.intersectObject(billboardHitTarget).length > 0) { doBillboardToggle(); }
        else if (heightFollowHitTarget && rc.intersectObject(heightFollowHitTarget).length > 0) { doHeightFollowToggle(); }
        else if (fullTrailHitTarget && rc.intersectObject(fullTrailHitTarget).length > 0) { doFullTrailToggle(); }
      };
      const xrSession = scene.renderer.xr.getSession();
      if (xrSession) xrSession.addEventListener('select', xrSelectHandler);
    });

    scene.addEventListener('exit-vr', () => {
      console.log('[ar] exit-vr fired');
      overlay.style.display = 'flex';
      exitBtn.style.display = 'none';
      // Remove XR select listener and hide 3D menu
      const xrSession = scene.renderer.xr.getSession();
      if (xrSession && xrSelectHandler) xrSession.removeEventListener('select', xrSelectHandler);
      xrSelectHandler = null;
      if (arMenuGroup) arMenuGroup.visible = false;
      video.pause();
      updateButtonState();
      // Stop per-frame tracking; restore field meshes to preview pose
      wasmFieldReady = false;
      if (spatialMath) spatialMath.reset();
      if (leftFieldMesh && rightFieldMesh) {
        const previewMat = new THREE.Matrix4().compose(
          FIELD_PREVIEW_POS, FIELD_PREVIEW_QUAT, FIELD_PREVIEW_SCALE);
        for (const mesh of [leftFieldMesh, rightFieldMesh]) {
          // traverse (not just mesh.layers.set) so any parented skeleton/ring
          // overlay content resets to mono visibility too, not just the
          // contour mesh itself — layers are per-object, not inherited.
          mesh.traverse(o => { if (o.isMesh) o.layers.set(0); });
          mesh.matrix.copy(previewMat);
          mesh.matrixWorldNeedsUpdate = true;
        }
      }
    });

    // Surface any unhandled errors to the status div so they're visible on headset
    window.addEventListener('error', e => {
      statusEl.textContent = 'JS error: ' + e.message;
      console.error('[window error]', e.message, e.filename, e.lineno);
    });
    window.addEventListener('unhandledrejection', e => {
      statusEl.textContent = 'Promise error: ' + (e.reason?.message ?? e.reason);
      console.error('[unhandledrejection]', e.reason);
    });
  </script>
</body>
</html>
