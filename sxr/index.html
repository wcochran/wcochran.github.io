<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stereo Video AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- hls.js — Chrome has no native HLS <video> support; needed for .m3u8 streams -->
  <!-- 1.6+ required: our streams are HEVC in MPEG-TS, which 1.5's demuxer can't parse -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #111; }

    #overlay {
      position: fixed; inset: 0; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88); color: #fff;
      font-family: system-ui, sans-serif; z-index: 10;
    }
    #overlay h1 { margin: 0 0 0.4em; font-size: 1.3em; font-weight: 600; }
    #overlay p  { margin: 0 0 1.4em; font-size: 0.9em; color: #aaa; text-align: center; max-width: 320px; }

    .exp-btn {
      padding: 14px 36px; font-size: 1.05em; font-weight: 600;
      background: #0070f3; color: #fff; border: none;
      border-radius: 10px; cursor: pointer; letter-spacing: 0.02em;
      min-width: 220px;
    }
    .exp-btn:disabled { background: #444; cursor: default; }

    #status { margin-top: 1em; font-size: 0.8em; color: #777; }

    /* Exit button shown via dom-overlay inside AR */
    #ar-overlay {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
    }
    #exit-ar {
      padding: 8px 18px; background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.5); border-radius: 8px;
      font-size: 0.95em; cursor: pointer; display: none;
    }
  </style>
</head>
<body>

  <!--
    dom-overlay element: HTML drawn on top of the AR camera feed.
    Pass its id to the webxr component below.
  -->
  <div id="ar-overlay">
    <button id="exit-ar">Exit AR</button>
  </div>

  <!-- Video lives outside <a-assets> so A-Frame doesn't block scene init on it.
       src is set dynamically when the user picks an experience. -->
  <video
    id="video"
    crossorigin="anonymous"
    loop
    muted
    playsinline
    webkit-playsinline
    preload="none"
    style="display:none"
  ></video>

  <a-scene
    id="scene"
    field-tracker
    webxr="requiredFeatures: local;
           optionalFeatures: local-floor, dom-overlay, bounded-floor, hand-tracking;
           overlayElement: #ar-overlay"
    renderer="colorManagement: true; alpha: true; antialias: true"
    background="color: transparent; transparent: true"
    vr-mode-ui="enabled: false"
  >

    <!-- Stereo quad — placed once in world space when AR starts, then stays fixed -->
    <a-entity id="stereo-quad"></a-entity>

    <!--
      Field contour preview — 1 ft = 5 mm scale, centred in front of viewer.
      field X (long ±186 ft) → Three.js X  (horizontal)
      field Y (wide ±80 ft)  → Three.js Y  (vertical)
      field Z (height 0-45)  → Three.js Z  (goal posts toward viewer)
    -->
  </a-scene>

  <div id="overlay">
    <h1>Stereo Video AR</h1>
    <p>Choose an AR experience:</p>
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px">
      <button class="exp-btn" data-exp="nfl" disabled>NFL / Cardinals</button>
      <button class="exp-btn" data-exp="mlb" disabled>MLB / Braves</button>
      <button class="exp-btn" data-exp="nba" disabled>NBA / Hawks</button>
      <button class="exp-btn" data-exp="tennis" disabled>Tennis / Intennse</button>
      <button class="exp-btn" data-exp="matcat" disabled>Tennis / Mat Cat</button>
    </div>
    <div id="status">Loading…</div>
  </div>

  <script>
    // ─── Stereo Top/Bottom Video Component ───────────────────────────────────
    //
    // Renders the top half of a top/bottom stereo video to the left eye and
    // the bottom half to the right eye, using a custom GLSL shader whose
    // `eye` uniform (0=left, 1=right) is updated in onBeforeRender.
    //
    // URL param ?swap  — swaps left/right eye mapping (try if eyes are reversed)
    //
    AFRAME.registerComponent('stereo-tb', {
      schema: {
        src:    { type: 'string', default: '#video' },
        mask:   { type: 'string', default: '' },  // URL to alpha mask PNG; '' = fully opaque
        layout: { type: 'string', default: 'tb' },// 'tb' (top/bottom) or 'sbs' (side-by-side)
        width:  { type: 'number', default: 3.0 },
        height: { type: 'number', default: 0 }    // 0 = auto-fit from video aspect ratio
      },

      init: function () {
        const params = new URLSearchParams(location.search);
        this.swapEyes = params.has('swap');

        const video = document.querySelector(this.data.src);
        if (!video) { console.error('[stereo-tb] element not found:', this.data.src); return; }
        this.video = video;

        // VideoTexture — Three.js flips Y by default so:
        //   UV y=1  →  top    of video frame  (left-eye content in T/B stereo)
        //   UV y=0  →  bottom of video frame  (right-eye content in T/B stereo)
        const texture = new THREE.VideoTexture(video);
        // Plain bilinear — no mip chain regenerated every frame, no inter-mip blurring.
        // The screen fills most of the FOV so trilinear mipmapping buys little and
        // adds blur. Anisotropic filtering sharpens the slightly pitched surface.
        texture.generateMipmaps = false;
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.anisotropy = this.el.sceneEl.renderer.capabilities.getMaxAnisotropy();
        this.texture = texture;

        // Alpha mask — same stereo T/B layout as the video.
        // Black pixels (r=0) → alpha=0 → XR compositor shows passthrough camera feed.
        // White pixels (r=1) → alpha=1 → video is fully opaque.
        // If no mask URL is provided, a 1×1 white texture makes the video fully opaque.
        let maskTexture;
        if (this.data.mask) {
          maskTexture = new THREE.TextureLoader().load(this.data.mask);
          maskTexture.generateMipmaps = false;
          maskTexture.minFilter = THREE.LinearFilter;
          maskTexture.magFilter = THREE.LinearFilter;
          maskTexture.colorSpace = THREE.NoColorSpace; // raw linear data — no sRGB gamma lift
        } else {
          const mc = document.createElement('canvas');
          mc.width = mc.height = 1;
          mc.getContext('2d').fillStyle = 'white';
          mc.getContext('2d').fillRect(0, 0, 1, 1);
          maskTexture = new THREE.CanvasTexture(mc);
          maskTexture.colorSpace = THREE.NoColorSpace;
        }
        this.maskTexture = maskTexture;

        // Shader remaps the full-quad UV [0,1] to the appropriate half-frame:
        //   top/bottom:    left eye (eye=0) → upper half, right eye → lower half
        //   side-by-side:  left eye (eye=0) → left half,  right eye → right half
        this.material = new THREE.ShaderMaterial({
          uniforms: {
            map:  { value: texture },
            mask: { value: maskTexture },
            eye:  { value: 0.0 },
            sbs:  { value: this.data.layout === 'sbs' ? 1.0 : 0.0 }
          },
          vertexShader: /* glsl */`
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: /* glsl */`
            uniform sampler2D map;
            uniform sampler2D mask;
            uniform float eye;   // 0 = left, 1 = right
            uniform float sbs;   // 0 = top/bottom, 1 = side-by-side
            varying vec2 vUv;
            void main() {
              // T/B: left eye → upper half (flipY puts frame top at y=1).
              // SBS: left eye → left half.
              vec2 uvTb  = vec2(vUv.x, vUv.y * 0.5 + (1.0 - eye) * 0.5);
              vec2 uvSbs = vec2(vUv.x * 0.5 + eye * 0.5, vUv.y);
              vec2 uv = mix(uvTb, uvSbs, sbs);
              vec4 color = texture2D(map, uv);
              // Red channel of mask drives alpha: black=transparent (passthrough),
              // white=opaque (video visible).  XR compositor uses alpha to composite
              // rendered content over the camera feed.
              float alpha = texture2D(mask, uv).r;
              gl_FragColor = vec4(color.rgb, alpha);
            }
          `,
          transparent: true,   // enable alpha blending so XR compositor sees alpha=0 as passthrough
          depthWrite: false,
          side: THREE.DoubleSide
        });

        // Placeholder geometry — corrected once video dimensions are known
        this.mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(this.data.width, this.data.width * (9.0/32.0)),
          this.material
        );

        const self = this;
        this.mesh.onBeforeRender = function (renderer, _scene, camera) {
          const xrCam = renderer.xr.getCamera();
          let eyeIdx = 0; // default: mono → left-eye half
          if (xrCam && xrCam.cameras && xrCam.cameras.length >= 2) {
            eyeIdx = (camera === xrCam.cameras[0]) ? 0 : 1;
          }
          if (self.swapEyes) eyeIdx = 1 - eyeIdx;
          self.material.uniforms.eye.value = eyeIdx;
        };

        // Disable frustum culling — the placed quad can easily be outside the
        // default bounding-sphere estimate, especially after world placement.
        this.mesh.frustumCulled = false;

        // Render first (before field contours) and clear depth afterward so
        // field geometry is never occluded by the video screen.
        this.mesh.renderOrder = 0;
        this.mesh.onAfterRender = function(renderer) { renderer.clearDepth(); };

        this.el.setObject3D('mesh', this.mesh);

        // Adjust quad aspect ratio once metadata is loaded
        if (video.readyState >= 1) {
          this._fitToVideo();
        } else {
          video.addEventListener('loadedmetadata', () => this._fitToVideo());
        }
      },

      _fitToVideo: function () {
        // If explicit height was provided via registration data, use it directly.
        if (this.data.height > 0) {
          const width  = this.data.width;
          const height = this.data.height;
          this.mesh.geometry.dispose();
          this.mesh.geometry = new THREE.PlaneGeometry(width, height);
          console.log(`[stereo-tb] registration-sized quad ${width.toFixed(4)}×${height.toFixed(4)} m`);
          return;
        }
        // Otherwise infer height from the video's pixel dimensions.
        const { videoWidth: w, videoHeight: h } = this.video;
        if (!w || !h) return;
        // Per-eye aspect: T/B splits height in half, SBS splits width in half.
        const aspect = this.data.layout === 'sbs' ? (w / 2) / h : w / (h / 2);
        const width  = this.data.width;
        const height = width / aspect;
        this.mesh.geometry.dispose();
        this.mesh.geometry = new THREE.PlaneGeometry(width, height);
        console.log(`[stereo-tb] video ${w}×${h} → per-eye aspect ${aspect.toFixed(3)} → quad ${width.toFixed(4)}×${height.toFixed(4)} m`);
      },

      remove: function () {
        if (this.texture)  this.texture.dispose();
        if (this.material) this.material.dispose();
        if (this.mesh)     this.mesh.geometry.dispose();
        this.el.removeObject3D('mesh');
      }
    });

    // ─── Per-frame WASM update ────────────────────────────────────────────────
    //
    // Delegates all per-eye field-transform computation (z-shear warp, billboard,
    // height-follow) to the spatial_math WASM module and applies the results to
    // the Three.js scene graph.
    //
    function updateFromWasm() {
      if (!spatialMath || !wasmFieldReady || !leftFieldMesh || !rightFieldMesh) return;
      const xrCam = scene.renderer.xr.getCamera();
      if (!xrCam) return;
      const isStereo = xrCam.cameras && xrCam.cameras.length >= 2;

      // Each matrixWorld.elements is already a Float32Array (column-major, 16 floats).
      // In mono mode pass the single camera matrix for both eyes — outputs are identical.
      const leftMat  = isStereo ? xrCam.cameras[0].matrixWorld.elements : xrCam.matrixWorld.elements;
      const rightMat = isStereo ? xrCam.cameras[1].matrixWorld.elements : xrCam.matrixWorld.elements;
      const result = spatialMath.update(leftMat, rightMat, xrCam.matrixWorld.elements);

      // result[0..16]  — left-eye  M4 (column-major)
      leftFieldMesh.matrix.fromArray(result, 0);
      leftFieldMesh.matrixWorldNeedsUpdate = true;

      // result[16..32] — right-eye M4 (column-major); skip in mono (same as left)
      if (isStereo) {
        rightFieldMesh.matrix.fromArray(result, 16);
        rightFieldMesh.matrixWorldNeedsUpdate = true;
      }

      // result[32..35] — screen position  (updated by height-follow / billboard)
      // result[35..39] — screen quaternion (updated by billboard)
      quad.object3D.position.set(result[32], result[33], result[34]);
      quad.object3D.quaternion.set(result[35], result[36], result[37], result[38]);
    }

    AFRAME.registerComponent('field-tracker', {
      tick: function (time, timeDelta) {
        updateFromWasm();
        if (tennisOverlayActive) {
          try {
            updateTennisMatchOverlay(timeDelta);
          } catch (e) {
            console.error('[tennis-data] update failed, disabling:', e);
            statusEl.textContent = 'Tennis data error: ' + e.message;
            tennisOverlayActive = false;
          }
        }
      }
    });

    // ─── Extruded Tube Mesh — port of ExtrudedTubeMesh.kt ────────────────────
    //
    // Builds a tube mesh by extruding a circular cross-section along a polyline
    // spine using the Double Reflection parallel-transport algorithm (no twist).
    //
    // Returns a THREE.BufferGeometry with position + normal attributes and index.
    //

    // Find a vector perpendicular to V (same logic as Kotlin companion object).
    function _perpVector(v) {
      const ax = Math.abs(v.x), ay = Math.abs(v.y), az = Math.abs(v.z);
      if (ax <= ay && ax <= az) return new THREE.Vector3(0,   v.z, -v.y);
      if (ay <= ax && ay <= az) return new THREE.Vector3(v.z, 0,   -v.x);
      return new THREE.Vector3(v.y, -v.x, 0);
    }

    function buildExtrudedTubeMesh(spine, radius, turns, addEndCaps = true) {
      const N         = spine.length;
      const turnAngle = 2 * Math.PI / turns;

      // Normalized direction vectors for each spine segment
      const spineVec = new Array(N);
      for (let i = 0; i < N - 1; i++)
        spineVec[i] = spine[i+1].clone().sub(spine[i]).normalize();
      spineVec[N-1] = spine[1].clone().sub(spine[0]).normalize();

      // Tangent at each spine point = normalized average of adjacent segment dirs
      const tangents = new Array(N);
      tangents[0]   = spineVec[0].clone();
      tangents[N-1] = spineVec[N-2].clone();
      for (let i = 1; i < N - 1; i++)
        tangents[i] = spineVec[i-1].clone().add(spineVec[i]).normalize();

      const numCylVerts = N * (turns + 1);
      const numCapVerts = addEndCaps ? 2 * turns : 0;
      const numVerts    = numCylVerts + numCapVerts;
      const positions   = new Float32Array(numVerts * 3);
      const normals     = new Float32Array(numVerts * 3);

      // Write one vertex into the flat arrays
      function setVert(idx, px, py, pz, nx, ny, nz) {
        positions[idx*3]   = px; positions[idx*3+1] = py; positions[idx*3+2] = pz;
        normals[idx*3]     = nx; normals[idx*3+1]   = ny; normals[idx*3+2]   = nz;
      }

      // Generate one ring of cross-section vertices at spine point i.
      // X = spine position, R/S = orthonormal frame vectors, spineV = segment dir.
      function outputCrossSection(i, X, R, S, spineV) {
        for (let j = 0; j <= turns; j++) {
          const ti    = (j === turns) ? 0 : j;
          const angle = ti * turnAngle;
          const cosA  = Math.cos(angle), sinA = Math.sin(angle);
          // D: point on unit circle in the cross-section plane
          const Dx = S.x*cosA + R.x*sinA;
          const Dy = S.y*cosA + R.y*sinA;
          const Dz = S.z*cosA + R.z*sinA;
          // Nv: D projected perpendicular to spine (for correct normals on bends)
          const dot = Dx*spineV.x + Dy*spineV.y + Dz*spineV.z;
          const Nvx = Dx - dot*spineV.x;
          const Nvy = Dy - dot*spineV.y;
          const Nvz = Dz - dot*spineV.z;
          const m   = Math.sqrt(Nvx*Nvx + Nvy*Nvy + Nvz*Nvz);
          const u   = radius / m;
          const nm  = 1 / m;
          setVert(i*(turns+1) + j,
            X.x + Dx*u, X.y + Dy*u, X.z + Dz*u,
            Nvx*nm, Nvy*nm, Nvz*nm);
        }
      }

      // Bootstrap first frame and first cross-section
      let X0 = spine[0].clone();
      let T0 = tangents[0].clone();
      let R0 = _perpVector(T0).normalize();
      const S0 = T0.clone().cross(R0);
      outputCrossSection(0, X0, R0, S0, spineVec[0]);

      // Double Reflection Algorithm — propagates the frame with no twist
      for (let i = 1; i < N; i++) {
        const X1 = spine[i];
        const V1 = X1.clone().sub(X0);
        const c1 = V1.dot(V1);
        // Reflect R0 and T0 across the plane perpendicular to V1
        const RL = R0.clone().addScaledVector(V1, -2 * V1.dot(R0) / c1);
        const TL = T0.clone().addScaledVector(V1, -2 * V1.dot(T0) / c1);
        const T1 = tangents[i];
        const V2 = T1.clone().sub(TL);
        const c2 = V2.dot(V2);
        // Reflect again to align with the new tangent
        const R1 = c2 > 1e-10
          ? RL.clone().addScaledVector(V2, -2 * V2.dot(RL) / c2)
          : RL.clone();
        const S1 = T1.clone().cross(R1);
        outputCrossSection(i, X1, R1, S1, spineVec[i-1]);
        X0 = X1.clone(); T0 = T1.clone(); R0 = R1.clone();
      }

      // End caps: replicate the first/last cross-section vertices with flat normals
      let startCapIdx = 0, endCapIdx = 0;
      if (addEndCaps) {
        startCapIdx = numCylVerts;
        const sn = spineVec[0];
        for (let i = 0; i < turns; i++) {
          const s = i * 3;
          setVert(startCapIdx + i,
            positions[s], positions[s+1], positions[s+2],
            -sn.x, -sn.y, -sn.z);
        }
        endCapIdx = numCylVerts + turns;
        const en  = spineVec[N-2];
        const lcs = (numCylVerts - (turns+1)) * 3;
        for (let i = 0; i < turns; i++) {
          const s = lcs + i*3;
          setVert(endCapIdx + i,
            positions[s], positions[s+1], positions[s+2],
            en.x, en.y, en.z);
        }
      }

      // Build one combined triangle strip for the cylinder body
      // (degenerate triangles stitch adjacent cylinders together)
      const strip = [];
      for (let i = 0; i < N - 1; i++) {
        if (i > 0) strip.push(i * (turns+1));
        for (let j = 0; j <= turns; j++) {
          strip.push(i*(turns+1) + j);
          strip.push((i+1)*(turns+1) + j);
        }
        if (i < N - 2) strip.push((i+1)*(turns+1) + turns);
      }

      // Cap strips — winding order matches Kotlin
      const startCap = [], endCap = [];
      if (addEndCaps) {
        let up = 0, down = turns - 1;
        for (let i = 0; i < turns; i++)
          startCap.push((i & 1) === 0 ? startCapIdx + down-- : startCapIdx + up++);
        up = turns - 1; down = 0;
        for (let i = 0; i < turns; i++)
          endCap.push((i & 1) === 0 ? endCapIdx + down++ : endCapIdx + up--);
      }

      // Convert all strips to indexed triangles (matches Kotlin triangles(ccw=false))
      const ccwIdx = 1;
      const tris   = [];
      for (const s of (addEndCaps ? [strip, startCap, endCap] : [strip])) {
        for (let n = 2; n < s.length; n++) {
          const ia = s[n-2], ib = s[n-1], ic = s[n];
          const ax = positions[ia*3], ay = positions[ia*3+1], az = positions[ia*3+2];
          const bx = positions[ib*3], by = positions[ib*3+1], bz = positions[ib*3+2];
          const cx = positions[ic*3], cy = positions[ic*3+1], cz = positions[ic*3+2];
          const v0x=ax-bx, v0y=ay-by, v0z=az-bz;
          const v1x=cx-ax, v1y=cy-ay, v1z=cz-az;
          const ex=v0y*v1z-v0z*v1y, ey=v0z*v1x-v0x*v1z, ez=v0x*v1y-v0y*v1x;
          if (ex*ex + ey*ey + ez*ez < 1e-20) continue; // degenerate — skip
          tris.push(ia);
          if (n % 2 === ccwIdx) { tris.push(ic, ib); }
          else                  { tris.push(ib, ic); }
        }
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('normal',   new THREE.BufferAttribute(normals,   3));
      geo.setIndex(tris);
      return geo;
    }

    // ─── Football Field Contours ──────────────────────────────────────────────
    //
    // Loads nfl_football_contours.json, builds one ExtrudedTubeMesh per segment,
    // then merges all into a single draw call.
    //
    // Coordinates are raw FOP feet (no pre-scaling).  The FOP-to-room transform
    // M = P_camera * S * inv(P_fopl) is applied to the entity by placeScreenAtHead().
    // For non-AR preview a 1 ft = 5 mm miniature scale is set instead.
    //
    // filenames may be a single string or an array of strings.
    async function buildFieldContours(filenames) {
      const files = Array.isArray(filenames) ? filenames : [filenames];
      const datasets = await Promise.all(files.map(f => fetch(f).then(r => r.json())));

      const radius = 0.5;              // 0.5 ft — entity transform handles scale
      const TURNS  = 8;

      const allPos = [], allNorm = [], allIdx = [];
      let base = 0;

      for (const data of datasets) {
        for (const seg of data.Segments) {
          if (seg.length < 2) continue;
          const spine = seg.map(p => new THREE.Vector3(p.X, p.Y, p.Z));
          const geo   = buildExtrudedTubeMesh(spine, radius, TURNS);
          const pos   = geo.getAttribute('position');
          const nrm   = geo.getAttribute('normal');
          const idx   = geo.getIndex().array;
          for (let i = 0; i < pos.count; i++) {
            allPos.push(pos.getX(i), pos.getY(i), pos.getZ(i));
            allNorm.push(nrm.getX(i), nrm.getY(i), nrm.getZ(i));
          }
          for (let i = 0; i < idx.length; i++) allIdx.push(base + idx[i]);
          base += pos.count;
          geo.dispose();
        }
      }

      const merged = new THREE.BufferGeometry();
      merged.setAttribute('position', new THREE.Float32BufferAttribute(allPos, 3));
      merged.setAttribute('normal',   new THREE.Float32BufferAttribute(allNorm, 3));
      merged.setIndex(allIdx);

      const material = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide, transparent: true });
      return { geometry: merged, material };
    }

    // ─── Tennis Match Data Visualization (skeletons + bounce rings) ───────────
    //
    // Player skeletons and ball-bounce rings animated from real match tracking
    // data (sample_tennis_data_v4.json), ported from the iOS RegAR app's
    // SkeletonEntity/TennisMotions/BounceRingDropper — see that codebase for
    // the reference implementation this mirrors.
    //
    // Placement: this data shares tennis_court_contours_net.json's coordinate
    // convention (FOP feet, Z-up, court-center origin), so it is *not* given
    // its own placement transform — it is parented directly onto leftFieldMesh/
    // rightFieldMesh (the same per-eye meshes the court contour lines use),
    // inheriting the exact same registration-derived, WASM-computed z-shear
    // warp every frame. This is what keeps it aligned with an experience's
    // video/passthrough content exactly like the contour lines are, rather
    // than floating in its own separately-placed diorama.
    //
    // Ball shot trails (the ribbon shader) and racquets (the Catmull-Rom hoop)
    // are not yet ported — this covers skeletons + bounce rings only.

    const FEET_PER_METER = 3.280839895;

    // Body bone connectivity (indices into the 13 tracked body joints) and per-
    // player color, matching RegAR's SkeletonEntity.bones / ContentView colors.
    const TENNIS_BONES = [
      [0, 1], [1, 3], [3, 5],     // neck → lShoulder → lElbow → lWrist
      [0, 2], [2, 4], [4, 6],     // neck → rShoulder → rElbow → rWrist
      [0, 7], [7, 9], [9, 11],    // neck → lHip → lKnee → lAnkle
      [0, 8], [8, 10], [10, 12],  // neck → rHip → rKnee → rAnkle
      [7, 8]                      // lHip ↔ rHip (pelvis cross-bar)
    ];
    const TENNIS_JOINT_COUNT  = 13;   // body joints drawn as spheres
    const TENNIS_BONE_RADIUS  = 0.07; // FOP feet
    const TENNIS_JOINT_RADIUS = 0.10; // FOP feet
    const TENNIS_PLAYER_COLORS = { S0AG: 0x00ffff, A0E2: 0xff9500 };  // Sinner cyan, Alcaraz orange

    // Racquet (joint indices 13-19: handle, shaft, head, rightEdge, leftEdge,
    // rightCorner, leftCorner). Grip runs handle→shaft, throat splits shaft to
    // both corners; the hoop itself is a smooth closed loop, not straight bones
    // — matches RegAR's SkeletonEntity.racquetBones/hoopJoints.
    const TENNIS_RACQUET_BONES = [[13, 14], [14, 18], [14, 19]];
    const TENNIS_RACQUET_RADIUS = 0.035; // FOP feet
    // Rim order: rightCorner → rightEdge → head → leftEdge → leftCorner (loop
    // closes back across the throat). A periodic Catmull-Rom through these five
    // points plus two synthetic "shoulder" points (approximating a real
    // racquet's egg shape — flat across the tip, tighter at the throat) gives
    // the rounded head outline.
    const TENNIS_HOOP_JOINTS = [18, 16, 15, 17, 19];
    const TENNIS_HOOP_SAMPLES_PER_SEGMENT = 6;
    const TENNIS_HOOP_SHOULDER_LATERAL = 0.88; // fraction of the rim's half-width
    const TENNIS_HOOP_SHOULDER_HEIGHT  = 0.55; // fraction of the chord-center→tip height
    const TENNIS_HOOP_CONTROL_COUNT = TENNIS_HOOP_JOINTS.length + 2; // rim + 2 shoulders

    // Real between-point breaks in the source match run 15-30s — this app plays
    // the whole match continuously rather than one on-demand rally at a time,
    // so waiting that long between points is deadly. Once a gap has been
    // waited out this long, jump straight to the next rally's start instead.
    const MAX_GAP_SECONDS = 3;

    // Ball trail — matches RegAR's TennisRallyBallPlayer/TennisRallyPlayer values.
    const COMET_TRAIL_FEET   = 16;    // length of the lit comet tail, FOP feet
    const RIBBON_WIDTH       = 0.25;  // FOP feet (see stereo-tb note: no /2 — matches ribbon_material.usda's raw side*ribbonWidth offset)
    const BALL_RADIUS        = 0.4;   // FOP feet
    const COMET_PATH_SAMPLES = 200;   // samples across a whole rally's continuous ball path
    const SHOT_PATH_SAMPLES  = 50;    // samples across a single shot arc (matches RegAR's pathFeet() default)

    // Shared unit cylinder for all bone segments (radius 1, length 1, base at
    // y=0) — one geometry reused via per-instance position/scale/quaternion,
    // matching RegAR's "one shared unit-cylinder mesh, transform-animated per
    // frame" approach (no per-frame mesh regeneration).
    const TENNIS_UNIT_CYLINDER = (() => {
      const geo = new THREE.CylinderGeometry(1, 1, 1, 10, 1, true);
      geo.translate(0, 0.5, 0);
      return geo;
    })();

    // Per-eye copies (parented onto leftFieldMesh/rightFieldMesh respectively) —
    // mirrors how the contour geometry itself is duplicated once per eye.
    let tennisSkeletonsL   = {};    // objectId -> { group, joints[13], bones[13] }
    let tennisSkeletonsR   = {};
    let tennisBounceRingsL = [];    // [{ mesh, t, shown }]
    let tennisBounceRingsR = [];
    // Comet mode: one ribbon mesh per rally (only the currently-active rally's
    // ribbon is visible/animated at a time), plus one ball sphere.
    let tennisCometRibbonsL = [];   // [{ mesh, rally }]
    let tennisCometRibbonsR = [];
    let tennisCometBallL    = null;
    let tennisCometBallR    = null;
    // Full/persistent mode: one ribbon per Hit/Bounce arc, drawn in once and left.
    let tennisShotRibbonsL = [];    // [{ mesh, arc, started }]
    let tennisShotRibbonsR = [];
    let menuFullTrailOn    = false; // false = comet trail (default), true = persistent per-shot ribbons
    let tennisMatch        = null;  // { skelFrames, bounces, duration, ballRallies, shotArcs }
    let tennisClock        = 0;     // seconds, loops over tennisMatch.duration
    let tennisOverlayActive = false;
    // Index into tennisMatch.ballRallies of whichever rally is currently active,
    // or -1 during an inter-point gap; -2 is "not yet determined" so the very
    // first tick doesn't spuriously count as a transition. Tracked so bounce
    // rings/persistent shot trails clear at each rally boundary, not just once
    // per full match loop.
    let tennisLastRallyIndex = -2;
    // Segment id of whichever rally is current (persists through the gap after
    // it ends, until the next rally actually starts) — null once out of range
    // of any known rally. Gates bounce-ring/shot-ribbon reveal so an item from
    // a since-finished rally can never re-satisfy "tennisClock has passed its
    // timestamp" and pop back up (see updateShotTrails/the bounce reveal loop).
    let tennisCurrentRallySegment = null;
    let tennisGapElapsed = 0; // real seconds waited so far in the current inter-rally gap

    function evalPoly(coeffs, t) {
      let r = 0;
      for (let i = coeffs.length - 1; i >= 0; i--) r = r * t + coeffs[i];
      return r;
    }

    // Parses sample_tennis_data_v4.json into a flat, time-ordered skeleton-frame
    // list (using every frame with player joint data, not just in-rally frames —
    // a deliberate deviation from RegAR's per-rally replay, since this plays the
    // whole match continuously) plus a list of ball-bounce events derived from
    // "Skid" arcs (the brief ground-contact segment between a Hit and a Bounce
    // arc) exactly as RegAR's TennisMotions.bounceEvents does — not from the
    // frames[].ball.event_marker field, which the reference app also ignores.
    function parseTennisMatchData(json) {
      const t0abs = Date.parse(json.frames[0].ts);

      const skelFrames = [];
      // objectId of whoever's hitting each shot, keyed "segment:shot:arc" —
      // used below to color per-shot ball trails by the striking player.
      const hitterByKey = new Map();
      for (const fr of json.frames) {
        const b = fr.ball;
        if (b && fr.hitter && !hitterByKey.has(`${b.segment}:${b.shot}:${b.arc}`)) {
          hitterByKey.set(`${b.segment}:${b.shot}:${b.arc}`, fr.hitter);
        }
        if (!fr.players || fr.players.length === 0) continue;
        const t = (Date.parse(fr.ts) - t0abs) / 1000;
        const byId = {};
        for (const p of fr.players) {
          if (!p.joints) continue;
          byId[p.objectId] = p.joints.map(j => j
            ? new THREE.Vector3(j[0] * FEET_PER_METER, j[1] * FEET_PER_METER, j[2] * FEET_PER_METER)
            : null);
        }
        skelFrames.push({ t, players: byId });
      }

      const bounces = [];
      // Every ball-flight arc (Toss/Hit/Skid/Bounce/Clip), global-timed, kept for
      // both the continuous per-rally ball path (all kinds) and the persistent
      // per-shot ribbons (Hit/Bounce only) — see buildBallRallies/buildShotArcs.
      const arcs = [];
      for (const m of json.motions) {
        const zeroAbs  = Date.parse(m.zero_time_utc);
        const startAbs = Date.parse(m.ts_start);
        const endAbs   = Date.parse(m.ts_end);
        // Polynomials are evaluated at (segment-local time relative to that arc's
        // own zero_time_utc); deltaSeg converts our global clock into that local
        // time: tLocal = tGlobal + deltaSeg (see CurveGenerator.swift/evalPoly).
        const deltaSeg = (t0abs - zeroAbs) / 1000;
        arcs.push({
          segment: m.segment, shot: m.shot, arcNum: m.arc, kind: m.arc_type,
          tGlobalStart: (startAbs - t0abs) / 1000,
          tGlobalEnd:   (endAbs   - t0abs) / 1000,
          deltaSeg, cx: m.curve_params.x, cy: m.curve_params.y, cz: m.curve_params.z
        });

        if (m.arc_type === 'Skid') {
          const tLocalMid = ((startAbs - zeroAbs) + (endAbs - zeroAbs)) / 2 / 1000;
          const x = evalPoly(m.curve_params.x, tLocalMid) * FEET_PER_METER;
          const y = evalPoly(m.curve_params.y, tLocalMid) * FEET_PER_METER;
          const tGlobal = ((startAbs + endAbs) / 2 - t0abs) / 1000;
          bounces.push({ t: tGlobal, pos: new THREE.Vector3(x, y, 0), segment: m.segment });
        }
      }
      arcs.sort((a, b) => a.tGlobalStart - b.tGlobalStart);
      bounces.sort((a, b) => a.t - b.t);

      const duration = skelFrames.length ? skelFrames[skelFrames.length - 1].t : 0;
      const ballRallies = buildBallRallies(arcs);
      const shotArcs = buildShotArcs(arcs, hitterByKey);
      const hitColorTimeline = buildHitColorTimeline(arcs, hitterByKey);
      console.log(`[tennis-data] parsed ${skelFrames.length} skeleton frames, ` +
                  `${bounces.length} bounces, ${ballRallies.length} ball rallies, ` +
                  `${shotArcs.length} shot arcs, duration ${duration.toFixed(1)}s`);
      return { skelFrames, bounces, duration, ballRallies, shotArcs, hitColorTimeline };
    }

    // Sorted (by tGlobalStart, since `arcs` already is) list of {t, color} for
    // every Hit whose striker we could identify — the comet trail looks up
    // "most recent Hit at/before now" each frame to recolor by striker, mirroring
    // TennisRallyBallPlayer's hitColors (per-shot ribbons bake their color once
    // at creation instead, via buildShotArcs, since each is its own short-lived arc).
    function buildHitColorTimeline(arcs, hitterByKey) {
      const timeline = [];
      for (const a of arcs) {
        if (a.kind !== 'Hit') continue;
        const hitterId = hitterByKey.get(`${a.segment}:${a.shot}:${a.arcNum}`);
        if (hitterId && TENNIS_PLAYER_COLORS[hitterId] !== undefined) {
          timeline.push({ t: a.tGlobalStart, color: TENNIS_PLAYER_COLORS[hitterId] });
        }
      }
      return timeline;
    }

    // Most recent timeline color at/before t, or fallback if none yet.
    function colorAt(timeline, t, fallback) {
      let c = fallback;
      for (const e of timeline) { if (e.t <= t) c = e.color; else break; }
      return c;
    }

    // Evaluates a power-basis polynomial curve (x,y,z) at global time `tau`,
    // stepping through `arcs` (sorted by tGlobalStart) to find whichever arc is
    // active at that moment — mirrors TennisMotions.continuousRallyPathFeet's
    // arc-stepping, but keyed off our single global clock instead of per-segment
    // local time. `ai` is a mutable single-element array so callers can resume
    // stepping forward across repeated calls with increasing tau (avoids
    // rescanning from the start each sample).
    function evalArcsAt(arcs, tau, aiRef) {
      while (aiRef[0] < arcs.length - 1 && tau > arcs[aiRef[0]].tGlobalEnd) aiRef[0]++;
      const a = arcs[aiRef[0]];
      const tLocal = tau + a.deltaSeg;
      return new THREE.Vector3(
        evalPoly(a.cx, tLocal) * FEET_PER_METER,
        evalPoly(a.cy, tLocal) * FEET_PER_METER,
        evalPoly(a.cz, tLocal) * FEET_PER_METER
      );
    }

    // Samples arcs[] (already sorted, single contiguous run e.g. one rally's or
    // one shot's arcs) into `samples` evenly-spaced points across [tMin, tMax] —
    // mirrors TennisMotions.continuousRallyPathFeet.
    function sampleArcPath(arcs, tMin, tMax, samples) {
      const n = Math.max(2, samples);
      const pts = [];
      const aiRef = [0];
      for (let i = 0; i < n; i++) {
        const tau = tMin + (tMax - tMin) * i / (n - 1);
        pts.push(evalArcsAt(arcs, tau, aiRef));
      }
      return pts;
    }

    // Groups arcs by rally (segment) and builds one continuous sampled ball path
    // per rally, plus its cumulative arc length (for the comet-trail windowing).
    function buildBallRallies(arcs) {
      const bySegment = new Map();
      for (const a of arcs) {
        if (!bySegment.has(a.segment)) bySegment.set(a.segment, []);
        bySegment.get(a.segment).push(a);
      }
      const rallies = [];
      for (const segArcs of bySegment.values()) {
        segArcs.sort((a, b) => a.tGlobalStart - b.tGlobalStart);
        const tGlobalStart = segArcs[0].tGlobalStart;
        const tGlobalEnd   = Math.max(...segArcs.map(a => a.tGlobalEnd));
        const path = sampleArcPath(segArcs, tGlobalStart, tGlobalEnd, COMET_PATH_SAMPLES);
        const cumulativeLength = [0];
        for (let i = 1; i < path.length; i++) {
          cumulativeLength.push(cumulativeLength[i - 1] + path[i].distanceTo(path[i - 1]));
        }
        rallies.push({ segment: segArcs[0].segment, tGlobalStart, tGlobalEnd, path, cumulativeLength,
                        totalLength: cumulativeLength[cumulativeLength.length - 1] });
      }
      rallies.sort((a, b) => a.tGlobalStart - b.tGlobalStart);
      return rallies;
    }

    // One persistent ribbon per Hit/Bounce arc, colored by whichever player
    // struck the most recent Hit at/before it — mirrors TennisRallyPlayer's
    // per-arc color(for:) (a Bounce shares its preceding Hit's color).
    function buildShotArcs(arcs, hitterByKey) {
      const shotArcs = arcs.filter(a => a.kind === 'Hit' || a.kind === 'Bounce');
      const colors = Object.values(TENNIS_PLAYER_COLORS);
      let lastColor = colors[0] ?? 0xffffff;
      const out = [];
      for (const a of shotArcs) {
        if (a.kind === 'Hit') {
          const hitterId = hitterByKey.get(`${a.segment}:${a.shot}:${a.arcNum}`);
          if (hitterId && TENNIS_PLAYER_COLORS[hitterId] !== undefined) {
            lastColor = TENNIS_PLAYER_COLORS[hitterId];
          }
        }
        const path = sampleArcPath([a], a.tGlobalStart, a.tGlobalEnd, SHOT_PATH_SAMPLES);
        out.push({ segment: a.segment, tGlobalStart: a.tGlobalStart, tGlobalEnd: a.tGlobalEnd, path, color: lastColor });
      }
      return out;
    }

    function buildSkeletonEntity(color) {
      // transparent:true (queues it after the opaque pass) + renderOrder:1
      // (matches leftFieldMesh/rightFieldMesh) — needed so it draws *after*
      // the stereo-tb viewscreen's clearDepth() call, same as the contour
      // lines, or the (closer, simple flat-plane) viewscreen can win the
      // depth test against this more precisely-warped content and paint over it.
      const material  = new THREE.MeshBasicMaterial({ color, transparent: true });
      const sphereGeo = new THREE.SphereGeometry(TENNIS_JOINT_RADIUS, 10, 8);
      const group  = new THREE.Group();
      const joints = [];
      const bones  = [];
      for (let i = 0; i < TENNIS_JOINT_COUNT; i++) {
        const m = new THREE.Mesh(sphereGeo, material);
        m.visible = false;
        m.frustumCulled = false;
        m.renderOrder = 1;
        group.add(m);
        joints.push(m);
      }
      for (let i = 0; i < TENNIS_BONES.length; i++) {
        const m = new THREE.Mesh(TENNIS_UNIT_CYLINDER, material);
        m.visible = false;
        m.frustumCulled = false;
        m.renderOrder = 1;
        group.add(m);
        bones.push(m);
      }
      const racquetBones = [];
      for (let i = 0; i < TENNIS_RACQUET_BONES.length; i++) {
        const m = new THREE.Mesh(TENNIS_UNIT_CYLINDER, material);
        m.visible = false;
        m.frustumCulled = false;
        m.renderOrder = 1;
        group.add(m);
        racquetBones.push(m);
      }
      const hoopSegments = [];
      const hoopSegmentCount = TENNIS_HOOP_CONTROL_COUNT * TENNIS_HOOP_SAMPLES_PER_SEGMENT;
      for (let i = 0; i < hoopSegmentCount; i++) {
        const m = new THREE.Mesh(TENNIS_UNIT_CYLINDER, material);
        m.visible = false;
        m.frustumCulled = false;
        m.renderOrder = 1;
        group.add(m);
        hoopSegments.push(m);
      }
      return { group, joints, bones, racquetBones, hoopSegments };
    }

    const TENNIS_UP = new THREE.Vector3(0, 1, 0);

    // Stretches/rotates a unit +Y cylinder to span from point a to point b —
    // "scale Y to length, rotate +Y onto the bone direction" per RegAR's place().
    function placeBone(mesh, a, b, radius) {
      const dir = new THREE.Vector3().subVectors(b, a);
      const len = dir.length();
      if (len < 1e-5) { mesh.visible = false; return; }
      mesh.visible = true;
      mesh.position.copy(a);
      mesh.scale.set(radius, len, radius);
      const dirN = dir.divideScalar(len);
      const dot  = THREE.MathUtils.clamp(TENNIS_UP.dot(dirN), -1, 1);
      if (dot > 1 - 1e-6) {
        mesh.quaternion.identity();
      } else if (dot < -1 + 1e-6) {
        mesh.quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI);
      } else {
        const axis = new THREE.Vector3().crossVectors(TENNIS_UP, dirN).normalize();
        mesh.quaternion.setFromAxisAngle(axis, Math.acos(dot));
      }
    }

    // joints20: full 20-element per-player joint array (13 body + 7 racquet
    // points, indices as in meta.joint_order); any entry may be null/untracked.
    function updateSkeletonEntity(entity, joints20) {
      for (let i = 0; i < TENNIS_JOINT_COUNT; i++) {
        const j = joints20 ? joints20[i] : null;
        entity.joints[i].visible = !!j;
        if (j) entity.joints[i].position.copy(j);
      }
      for (let i = 0; i < TENNIS_BONES.length; i++) {
        const [ia, ib] = TENNIS_BONES[i];
        const a = joints20 ? joints20[ia] : null;
        const b = joints20 ? joints20[ib] : null;
        if (a && b) placeBone(entity.bones[i], a, b, TENNIS_BONE_RADIUS);
        else entity.bones[i].visible = false;
      }
      for (let i = 0; i < TENNIS_RACQUET_BONES.length; i++) {
        const [ia, ib] = TENNIS_RACQUET_BONES[i];
        const a = joints20 ? joints20[ia] : null;
        const b = joints20 ? joints20[ib] : null;
        if (a && b) placeBone(entity.racquetBones[i], a, b, TENNIS_RACQUET_RADIUS);
        else entity.racquetBones[i].visible = false;
      }
      positionHoop(entity, joints20);
    }

    // Positions the smooth racquet-head hoop: a closed centripetal Catmull-Rom
    // loop through the five rim joints plus two synthetic "shoulder" points
    // (egg shape — flat top, tighter throat), rendered as short cylinder
    // segments between consecutive loop samples. Hides entirely if any rim
    // joint is untracked this frame — matches SkeletonEntity.positionHoop.
    function positionHoop(entity, joints20) {
      const rim = TENNIS_HOOP_JOINTS.map(i => joints20 ? joints20[i] : null);
      if (rim.some(p => !p)) {
        for (const seg of entity.hoopSegments) seg.visible = false;
        return;
      }
      const [rc, re, head, le, lc] = rim;
      const center  = re.clone().add(le).multiplyScalar(0.5);           // midpoint of the lateral chord
      const lateral = re.clone().sub(le).multiplyScalar(0.5);          // chord half-width vector
      const toTip   = head.clone().sub(center);                        // chord center → tip
      const sr = center.clone()
        .addScaledVector(lateral, TENNIS_HOOP_SHOULDER_LATERAL)
        .addScaledVector(toTip, TENNIS_HOOP_SHOULDER_HEIGHT);
      const sl = center.clone()
        .addScaledVector(lateral, -TENNIS_HOOP_SHOULDER_LATERAL)
        .addScaledVector(toTip, TENNIS_HOOP_SHOULDER_HEIGHT);
      const controls = [rc, re, sr, head, sl, le, lc];
      const loop = closedLoopPath(controls, TENNIS_HOOP_SAMPLES_PER_SEGMENT);
      for (let k = 0; k < entity.hoopSegments.length; k++) {
        placeBone(entity.hoopSegments[k], loop[k], loop[(k + 1) % loop.length], TENNIS_RACQUET_RADIUS);
      }
    }

    // A smooth closed loop passing exactly through every control point in
    // order (periodic centripetal Catmull-Rom, alpha=0.5) — mirrors
    // CurveGenerator.closedLoopPath/centripetalCatmullRom. Returns
    // points.length * samplesPerSegment points; consumers connect
    // result[i]-result[(i+1) % result.length] to close the loop.
    function closedLoopPath(points, samplesPerSegment) {
      const n = points.length;
      if (n < 3) return points;
      const m = Math.max(1, samplesPerSegment);
      const out = [];
      for (let i = 0; i < n; i++) {
        const p0 = points[(i + n - 1) % n];
        const p1 = points[i];
        const p2 = points[(i + 1) % n];
        const p3 = points[(i + 2) % n];
        for (let j = 0; j < m; j++) out.push(centripetalCatmullRom(p0, p1, p2, p3, j / m));
      }
      return out;
    }

    function centripetalCatmullRom(p0, p1, p2, p3, t) {
      const knot = (a, b) => Math.max(Math.sqrt(a.distanceTo(b)), 1e-4);
      const t0 = 0;
      const t1 = t0 + knot(p0, p1);
      const t2 = t1 + knot(p1, p2);
      const t3 = t2 + knot(p2, p3);
      const u = t1 + t * (t2 - t1);
      const a1 = p0.clone().multiplyScalar((t1 - u) / (t1 - t0)).addScaledVector(p1, (u - t0) / (t1 - t0));
      const a2 = p1.clone().multiplyScalar((t2 - u) / (t2 - t1)).addScaledVector(p2, (u - t1) / (t2 - t1));
      const a3 = p2.clone().multiplyScalar((t3 - u) / (t3 - t2)).addScaledVector(p3, (u - t2) / (t3 - t2));
      const b1 = a1.clone().multiplyScalar((t2 - u) / (t2 - t0)).addScaledVector(a2, (u - t0) / (t2 - t0));
      const b2 = a2.clone().multiplyScalar((t3 - u) / (t3 - t1)).addScaledVector(a3, (u - t1) / (t3 - t1));
      return b1.multiplyScalar((t2 - u) / (t2 - t1)).addScaledVector(b2, (u - t1) / (t2 - t1));
    }

    // Element-wise lerp between two frames' per-player joint arrays, falling
    // back to whichever endpoint has a tracked value when the other is null —
    // matches RegAR's SkeletonRallyPlayer interpolation fallback.
    function lerpJointArrays(a, b, alpha) {
      if (!a && !b) return null;
      if (!a) return b;
      if (!b) return a;
      const n = Math.max(a.length, b.length);
      const out = new Array(n);
      for (let i = 0; i < n; i++) {
        const pa = a[i], pb = b[i];
        out[i] = (pa && pb) ? pa.clone().lerp(pb, alpha) : (pa || pb || null);
      }
      return out;
    }

    // Flat annulus (diameter 2 ft, ring width 0.3 ft — same dimensions as
    // RegAR's makeBounceRing), fully opaque color (alpha stays 1 — grazing-angle
    // translucent rings anti-alias into broken arcs, same rationale as the
    // reference app) but transparent:true + renderOrder:1 so it still queues
    // and draws after the viewscreen's clearDepth(), like the skeleton meshes.
    function buildBounceRing() {
      const geo = new THREE.RingGeometry(0.7, 1.0, 32);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.visible = false;
      mesh.frustumCulled = false;
      mesh.renderOrder = 1;
      return mesh;
    }

    // ─── Ball Shot Trail Ribbon (camera-facing, GLSL) ──────────────────────────
    //
    // Ported from RegAR's RibbonMesh.swift + ribbon_material.usda (a RealityKit
    // ShaderGraphMaterial), translated node-for-node into GLSL:
    //
    //  - Geometry: each path sample becomes TWO coincident vertices (uv.x = -1/+1,
    //    "side"), carrying a per-vertex tangent (direction along the path) and
    //    uv.y = fraction along the path (0..1). No width is baked in — width and
    //    camera-facing orientation are computed per-frame in the vertex shader,
    //    exactly like RegAR's GeometryModifier (which reads the tangent out of
    //    the mesh's *normal* channel — a RealityKit-specific workaround this port
    //    doesn't need, since GLSL lets us just declare a real `tangent` attribute).
    //  - Fragment shader: reveals the ribbon up to `fractionAlong`, fades in the
    //    trailing edge from `fractionBehind` over `tailFeather` (0 = hard cut,
    //    used by the persistent per-shot mode; >0 = soft feather, used by the
    //    comet mode), plus tiny cosmetic feathers at the path's absolute v=0/v=1
    //    ends (featherStart/featherEnd) and a dash pattern (dashLength/
    //    dashFraction, left at their no-op defaults — neither trail mode dashes).
    //
    function buildRibbonGeometry(path) {
      const N = path.length;
      const positions = new Float32Array(2 * N * 3);
      const tangents  = new Float32Array(2 * N * 3);
      const uvs       = new Float32Array(2 * N * 2);
      const jointTangents = new Array(N);
      for (let i = 1; i < N - 1; i++) {
        jointTangents[i] = path[i + 1].clone().sub(path[i - 1]).normalize();
      }
      jointTangents[0]     = path[1].clone().sub(path[0]).normalize();
      jointTangents[N - 1] = path[N - 1].clone().sub(path[N - 2]).normalize();

      for (let i = 0; i < N; i++) {
        const p = path[i], t = jointTangents[i], y = i / (N - 1);
        for (const side of [-1, 1]) {
          const vi = 2 * i + (side === -1 ? 0 : 1);
          positions[vi * 3]     = p.x; positions[vi * 3 + 1] = p.y; positions[vi * 3 + 2] = p.z;
          tangents[vi * 3]      = t.x; tangents[vi * 3 + 1]  = t.y; tangents[vi * 3 + 2]  = t.z;
          uvs[vi * 2]           = side; uvs[vi * 2 + 1]      = y;
        }
      }
      const indices = [];
      for (let n = 2; n < 2 * N; n++) {
        const i = n - 2, j = n - 1, k = n;
        if (n % 2 === 0) indices.push(i, j, k); else indices.push(i, k, j);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('tangent',  new THREE.BufferAttribute(tangents, 3));
      geo.setAttribute('uv',       new THREE.BufferAttribute(uvs, 2));
      geo.setIndex(indices);
      return geo;
    }

    // Width offset computed in LOCAL (object) space, not world space — matches
    // RegAR's ViewDirection/Normal nodes, which both declare space="model".
    // uRibbonWidth is in the same FOP-feet units as the path geometry, so doing
    // this in local space lets it shrink/grow through modelViewMatrix along
    // with everything else. Doing it in world space (an earlier version of this
    // port did) adds a feet-scale offset to an already-scaled-down world
    // position — on the ~0.01x Mat Cat registration scale that blew a 0.5 ft
    // ribbon up to ~40 ft.
    const RIBBON_VERTEX_SHADER = /* glsl */`
      attribute vec3 tangent;
      uniform float uRibbonWidth;
      uniform vec3 uLocalCameraPos;
      varying vec2 vUv;
      void main() {
        vUv = uv;
        vec3 viewDir = normalize(uLocalCameraPos - position);
        vec3 offsetDir = normalize(cross(viewDir, normalize(tangent)));
        vec3 localPos = position + offsetDir * uv.x * uRibbonWidth;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(localPos, 1.0);
      }
    `;

    const RIBBON_FRAGMENT_SHADER = /* glsl */`
      uniform float uFractionAlong;
      uniform float uFractionBehind;
      uniform float uTailFeather;
      uniform float uFeatherStart;
      uniform float uFeatherEnd;
      uniform float uDashLength;
      uniform float uDashFraction;
      uniform float uGlobalOpacity;
      uniform vec3  uColor;
      varying vec2 vUv;
      void main() {
        float v = vUv.y;
        float reveal = step(v, uFractionAlong);
        float dashCycle = fract(v / max(uDashLength, 0.001));
        float dash = step(dashCycle, uDashFraction);
        float tail = clamp((v - uFractionBehind) / max(uTailFeather, 0.0001), 0.0, 1.0);
        float headFeather = clamp(v / max(uFeatherStart, 0.001), 0.0, 1.0);
        float endFeather = clamp((1.0 - v) / max(uFeatherEnd, 0.001), 0.0, 1.0);
        float opacity = uGlobalOpacity * reveal * dash * tail * headFeather * endFeather;
        if (opacity <= 0.0) discard;
        gl_FragColor = vec4(uColor, opacity);
      }
    `;

    function buildRibbonMaterial(color) {
      return new THREE.ShaderMaterial({
        uniforms: {
          uRibbonWidth:    { value: RIBBON_WIDTH },
          uLocalCameraPos: { value: new THREE.Vector3() },
          uFractionAlong:  { value: 0 },
          uFractionBehind: { value: 0 },
          uTailFeather:    { value: 0.0001 },
          uFeatherStart:   { value: 0.001 },
          uFeatherEnd:     { value: 0.001 },
          uDashLength:     { value: 1 },
          uDashFraction:   { value: 1 },
          uGlobalOpacity:  { value: 1 },
          uColor:          { value: new THREE.Color(color) }
        },
        vertexShader: RIBBON_VERTEX_SHADER,
        fragmentShader: RIBBON_FRAGMENT_SHADER,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: true
      });
    }

    function buildRibbonMesh(path, color) {
      const mesh = new THREE.Mesh(buildRibbonGeometry(path), buildRibbonMaterial(color));
      mesh.visible = false;
      mesh.frustumCulled = false;
      mesh.renderOrder = 1;   // same viewscreen depth-clear survival as skeleton/rings
      return mesh;
    }

    // Small tennis-ball-yellow sphere riding the head of the comet trail.
    function buildTrailBall() {
      const geo = new THREE.SphereGeometry(BALL_RADIUS, 12, 10);
      const mat = new THREE.MeshBasicMaterial({ color: 0xd9f000, transparent: true });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.visible = false;
      mesh.frustumCulled = false;
      mesh.renderOrder = 1;
      return mesh;
    }

    // Removes any skeleton/ring content previously parented onto leftFieldMesh/
    // rightFieldMesh and disposes their (non-shared) geometries/materials.
    // Always safe to call even if nothing is loaded.
    function disposeTennisMatchOverlay() {
      for (const mesh of [leftFieldMesh, rightFieldMesh]) {
        if (!mesh) continue;
        for (const child of [...mesh.children]) {
          mesh.remove(child);
          child.traverse(o => {
            if (!o.isMesh) return;
            if (o.geometry && o.geometry !== TENNIS_UNIT_CYLINDER) o.geometry.dispose();
            if (o.material) o.material.dispose();
          });
        }
      }
      tennisSkeletonsL = tennisSkeletonsR = {};
      tennisBounceRingsL = tennisBounceRingsR = [];
      tennisCometRibbonsL = tennisCometRibbonsR = [];
      tennisCometBallL = tennisCometBallR = null;
      tennisShotRibbonsL = tennisShotRibbonsR = [];
      tennisMatch = null;
      tennisClock = 0;
      tennisLastRallyIndex = -2;
      tennisCurrentRallySegment = null;
      tennisGapElapsed = 0;
      tennisOverlayActive = false;
    }

    // Builds skeleton + bounce-ring content and parents one full copy onto
    // leftFieldMesh and another onto rightFieldMesh, so it inherits their
    // per-eye WASM-warped transform automatically — no placement code of its
    // own. Must run after loadFieldContoursForExp() has (re)built those meshes.
    async function loadTennisMatchOverlay(matchDataUrl) {
      disposeTennisMatchOverlay();
      if (!matchDataUrl || !leftFieldMesh || !rightFieldMesh) return;

      const json = await fetch(matchDataUrl).then(r => r.json());
      tennisMatch = parseTennisMatchData(json);
      tennisClock = 0;

      for (const eye of ['L', 'R']) {
        const parentMesh = eye === 'L' ? leftFieldMesh : rightFieldMesh;
        const skelMap = {};
        for (const [id, color] of Object.entries(TENNIS_PLAYER_COLORS)) {
          const entity = buildSkeletonEntity(color);
          parentMesh.add(entity.group);
          // Match the parent's CURRENT layer mask now — this fetch can easily
          // outlast placeScreenAtHead()'s one-time retroactive layer-propagate
          // (it's on a fixed 300ms timer), so don't rely on that alone or a
          // late-arriving overlay is left on the default layer, visible to
          // both eyes instead of just this one.
          entity.group.traverse(o => { if (o.isMesh) o.layers.mask = parentMesh.layers.mask; });
          skelMap[id] = entity;
        }
        const rings = tennisMatch.bounces.map(b => {
          const mesh = buildBounceRing();
          mesh.position.copy(b.pos);
          parentMesh.add(mesh);
          mesh.layers.mask = parentMesh.layers.mask;
          return { mesh, t: b.t, segment: b.segment, shown: false };
        });

        const fallbackColor = Object.values(TENNIS_PLAYER_COLORS)[0] ?? 0xffffff;
        const cometRibbons = tennisMatch.ballRallies.map(rally => {
          const mesh = buildRibbonMesh(rally.path, fallbackColor);
          parentMesh.add(mesh);
          mesh.layers.mask = parentMesh.layers.mask;
          return { mesh, rally };
        });
        const ball = buildTrailBall();
        parentMesh.add(ball);
        ball.layers.mask = parentMesh.layers.mask;

        const shotRibbons = tennisMatch.shotArcs.map(arc => {
          const mesh = buildRibbonMesh(arc.path, arc.color);
          mesh.material.uniforms.uFeatherStart.value = 0.15;   // soft head fade-in, matches TennisRallyPlayer
          parentMesh.add(mesh);
          mesh.layers.mask = parentMesh.layers.mask;
          return { mesh, arc, started: false };
        });

        if (eye === 'L') {
          tennisSkeletonsL = skelMap; tennisBounceRingsL = rings;
          tennisCometRibbonsL = cometRibbons; tennisCometBallL = ball; tennisShotRibbonsL = shotRibbons;
        } else {
          tennisSkeletonsR = skelMap; tennisBounceRingsR = rings;
          tennisCometRibbonsR = cometRibbons; tennisCometBallR = ball; tennisShotRibbonsR = shotRibbons;
        }
      }

      tennisOverlayActive = true;
      console.log('[tennis-data] overlay parented onto leftFieldMesh/rightFieldMesh');
    }

    // Per-frame update: advances the rally clock (looping over the whole
    // match), interpolates skeleton pose between the bracketing frames, and
    // reveals each bounce ring once the clock passes its timestamp. Updates
    // both eye copies — their transforms come for free from their parent mesh.
    // Hides every bounce ring and persistent shot ribbon and marks them
    // unrevealed again — used both at the full-match loop boundary and at each
    // individual rally transition (see tennisLastRallyIndex below).
    function clearRingsAndShotTrails() {
      for (const rings of [tennisBounceRingsL, tennisBounceRingsR]) {
        for (const r of rings) { r.mesh.visible = false; r.shown = false; }
      }
      for (const ribbons of [tennisShotRibbonsL, tennisShotRibbonsR]) {
        for (const r of ribbons) { r.mesh.visible = false; r.started = false; }
      }
    }

    function updateTennisMatchOverlay(dtMs) {
      if (!tennisMatch || !tennisMatch.skelFrames.length) return;
      // dt can be undefined on a component's very first tick, and can arrive as
      // one huge jump after the tab was backgrounded (rAF throttling) — guard
      // both, and loop (not just subtract once) so an oversized jump can't leave
      // the clock permanently stuck past duration.
      const dt = Number.isFinite(dtMs) ? dtMs / 1000 : 0;

      // Real between-point gaps run 15-30s; waiting them out in full would make
      // continuous whole-match playback deadly slow. If we're not currently
      // inside a rally, advance normally only until MAX_GAP_SECONDS of real
      // time has been waited, then jump straight to the next rally's start —
      // nothing renders during a gap anyway (no tracked skeleton/ball data
      // exists there), so there's nothing to fast-forward through, just a wait
      // to shorten.
      const rallies = tennisMatch.ballRallies;
      const inRallyNow = rallies.length > 0 &&
        rallies.some(r => tennisClock >= r.tGlobalStart && tennisClock <= r.tGlobalEnd);
      if (inRallyNow || rallies.length === 0) {
        tennisClock += dt;
        tennisGapElapsed = 0;
      } else {
        tennisGapElapsed += dt;
        if (tennisGapElapsed >= MAX_GAP_SECONDS) {
          const next = rallies.find(r => r.tGlobalStart > tennisClock);
          tennisClock = next ? next.tGlobalStart : (tennisMatch.duration + rallies[0].tGlobalStart);
          tennisGapElapsed = 0;
        } else {
          tennisClock += dt;
        }
      }
      while (tennisClock > tennisMatch.duration) {
        tennisClock -= tennisMatch.duration;
        clearRingsAndShotTrails();
      }

      const frames = tennisMatch.skelFrames;
      let lo = 0, hi = frames.length - 1;
      while (lo < hi) {
        const mid = (lo + hi + 1) >> 1;
        if (frames[mid].t <= tennisClock) lo = mid; else hi = mid - 1;
      }
      const f0 = frames[lo];
      const f1 = frames[Math.min(lo + 1, frames.length - 1)];
      const span  = f1.t - f0.t;
      const alpha = span > 1e-6 ? THREE.MathUtils.clamp((tennisClock - f0.t) / span, 0, 1) : 0;

      for (const id in TENNIS_PLAYER_COLORS) {
        const joints = lerpJointArrays(f0.players[id], f1.players[id], alpha);
        if (tennisSkeletonsL[id]) updateSkeletonEntity(tennisSkeletonsL[id], joints);
        if (tennisSkeletonsR[id]) updateSkeletonEntity(tennisSkeletonsR[id], joints);
      }

      // Clear rings/persistent trails at every rally boundary (not just once
      // per full match loop) — includes both rally→gap and gap→rally
      // transitions, so nothing from a finished rally lingers into the gap
      // before the next one starts. tennisCurrentRallySegment additionally
      // gates reveal below so a since-finished rally's items can never
      // re-satisfy "tennisClock has passed my timestamp" and pop back up.
      const activeRallyIndex = rallies.findIndex(
        r => tennisClock >= r.tGlobalStart && tennisClock <= r.tGlobalEnd);
      if (activeRallyIndex !== tennisLastRallyIndex) {
        clearRingsAndShotTrails();
        tennisLastRallyIndex = activeRallyIndex;
      }
      tennisCurrentRallySegment = activeRallyIndex >= 0 ? rallies[activeRallyIndex].segment : null;

      for (const rings of [tennisBounceRingsL, tennisBounceRingsR]) {
        for (const b of rings) {
          if (!b.shown && b.segment === tennisCurrentRallySegment && tennisClock >= b.t) {
            b.shown = true; b.mesh.visible = true;
          }
        }
      }

      updateRibbonCameraUniform();
      if (menuFullTrailOn) { hideCometTrail(); updateShotTrails(); }
      else                 { hideShotTrails(); updateCometTrail(activeRallyIndex); }
    }

    // Every ribbon parented directly onto leftFieldMesh/rightFieldMesh shares
    // that mesh's matrixWorld (no additional local transform of its own), so
    // the current-camera-position-in-local-space only needs computing once per
    // eye per tick, then broadcasting to every ribbon on that side.
    function updateRibbonCameraUniform() {
      const xrCam = scene.renderer.xr.getCamera();
      const camPos = new THREE.Vector3();
      if (xrCam && xrCam.matrixWorld) {
        camPos.setFromMatrixPosition(xrCam.matrixWorld);
      } else {
        const cameraEl = document.querySelector('[camera]');
        if (cameraEl && cameraEl.object3D) cameraEl.object3D.getWorldPosition(camPos);
      }
      for (const [parentMesh, ribbonSets] of [
        [leftFieldMesh,  [tennisCometRibbonsL, tennisShotRibbonsL]],
        [rightFieldMesh, [tennisCometRibbonsR, tennisShotRibbonsR]]
      ]) {
        if (!parentMesh) continue;
        const localCamPos = parentMesh.worldToLocal(camPos.clone());
        for (const set of ribbonSets) {
          for (const entry of set) entry.mesh.material.uniforms.uLocalCameraPos.value.copy(localCamPos);
        }
      }
    }

    // Largest index whose cumulative length is <= target (binary search) —
    // mirrors TennisRallyBallPlayer.behindIndexForLength.
    function behindIndexForLength(cumulativeLength, target) {
      let lo = 0, hi = cumulativeLength.length - 1, result = 0;
      while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (cumulativeLength[mid] <= target) { result = mid; lo = mid + 1; }
        else hi = mid - 1;
      }
      return result;
    }

    // Comet mode: exactly one rally's ribbon is visible at a time (whichever
    // contains tennisClock — during an inter-point gap, none does, and the
    // trail/ball simply vanish, same as the skeletons already do in that gap).
    // A fixed-length (COMET_TRAIL_FEET) window trails behind the head, feathered
    // to transparent at its tail — mirrors TennisRallyBallPlayer.update(dt:).
    function updateCometTrail(activeRallyIndex) {
      const active = tennisMatch.ballRallies[activeRallyIndex] ?? null;
      const fallbackColor = Object.values(TENNIS_PLAYER_COLORS)[0] ?? 0xffffff;
      const color = colorAt(tennisMatch.hitColorTimeline, tennisClock, fallbackColor);

      for (let i = 0; i < tennisMatch.ballRallies.length; i++) {
        const rally = tennisMatch.ballRallies[i];
        const isActive = rally === active;
        for (const ribbons of [tennisCometRibbonsL, tennisCometRibbonsR]) {
          const { mesh } = ribbons[i];
          mesh.visible = isActive;
          if (!isActive) continue;
          const span = rally.tGlobalEnd - rally.tGlobalStart;
          const head = span > 1e-6 ? THREE.MathUtils.clamp((tennisClock - rally.tGlobalStart) / span, 0, 1) : 0;
          const headIndex = Math.round(head * (rally.path.length - 1));
          const targetLength = Math.max(0, rally.cumulativeLength[headIndex] - COMET_TRAIL_FEET);
          const behind = behindIndexForLength(rally.cumulativeLength, targetLength) / (rally.path.length - 1);
          const u = mesh.material.uniforms;
          u.uFractionAlong.value  = head;
          u.uFractionBehind.value = behind;
          u.uTailFeather.value    = 0.5 * Math.max(0, head - behind);
          u.uColor.value.setHex(color);
        }
      }

      for (const ball of [tennisCometBallL, tennisCometBallR]) {
        ball.visible = !!active;
        if (!active) continue;
        const span = active.tGlobalEnd - active.tGlobalStart;
        const head = span > 1e-6 ? THREE.MathUtils.clamp((tennisClock - active.tGlobalStart) / span, 0, 1) : 0;
        const headIndexF = head * (active.path.length - 1);
        const i0 = Math.floor(headIndexF), i1 = Math.min(i0 + 1, active.path.length - 1);
        ball.position.copy(active.path[i0]).lerp(active.path[i1], headIndexF - i0);
      }
    }

    function hideCometTrail() {
      for (const ribbons of [tennisCometRibbonsL, tennisCometRibbonsR]) {
        for (const { mesh } of ribbons) mesh.visible = false;
      }
      if (tennisCometBallL) tennisCometBallL.visible = false;
      if (tennisCometBallR) tennisCometBallR.visible = false;
    }

    // Full/persistent mode: each Hit/Bounce arc's ribbon draws in once its start
    // time arrives, then stays fully drawn (fractionAlong clamps at 1) for the
    // rest of THIS rally — mirrors TennisRallyPlayer.update(dt:). Gated to the
    // current rally's segment so a since-finished rally's arcs (whose start
    // time is necessarily already in the past) never re-satisfy "started".
    function updateShotTrails() {
      for (let i = 0; i < tennisMatch.shotArcs.length; i++) {
        const arc = tennisMatch.shotArcs[i];
        const started = arc.segment === tennisCurrentRallySegment && tennisClock >= arc.tGlobalStart;
        for (const ribbons of [tennisShotRibbonsL, tennisShotRibbonsR]) {
          const entry = ribbons[i];
          if (!started) { entry.mesh.visible = false; continue; }
          entry.mesh.visible = true;
          const span = arc.tGlobalEnd - arc.tGlobalStart;
          const f = span > 1e-6 ? THREE.MathUtils.clamp((tennisClock - arc.tGlobalStart) / span, 0, 1) : 1;
          entry.mesh.material.uniforms.uFractionAlong.value = f;
        }
      }
    }

    function hideShotTrails() {
      for (const ribbons of [tennisShotRibbonsL, tennisShotRibbonsR]) {
        for (const { mesh } of ribbons) mesh.visible = false;
      }
    }

    // ─── App bootstrap ────────────────────────────────────────────────────────

    const scene    = document.getElementById('scene');
    const quad     = document.getElementById('stereo-quad');
    const video    = document.getElementById('video');
    const overlay  = document.getElementById('overlay');
    const expButtons = Array.from(document.querySelectorAll('.exp-btn'));
    const exitBtn  = document.getElementById('exit-ar');
    const statusEl = document.getElementById('status');

    // ── Experience configs ─────────────────────────────────────────────────────
    const EXPERIENCES = {
      nfl: {
        label:       'NFL / Cardinals',
        videoUrl:    'https://streams.quintar.ai/nfl-2025/20251207-LAR-ARI/clip1-sync1-waynereg3-fullframe.mp4',
        leftJson:    'cardinals_left_rect_corr.json',
        rightJson:   'cardinals_right_rect_corr.json',
        contoursJson:['nfl_football_contours.json'],
        maskUrl:     'cardinals_mask.png',
      },
      mlb: {
        label:       'MLB / Braves',
        videoUrl:    'https://d2fcywl64r1lfy.cloudfront.net/mlb-2024/20240906/TOR@ATL_2B_SGLRBI1_TB.mp4',
        leftJson:    'truist_l_corr.json',
        rightJson:   'truist_r_corr.json',
        contoursJson:['mlb_contours.json', 'truist_boundary.json'],
        maskUrl:     '',   // no mask — video rendered fully opaque
      },
      nba: {
        label:       'NBA / Hawks',
        videoUrl:    'https://streams.quintar.ai/nba-2025/20250310/76ers-hawks-clip1-tb.mp4',
        leftJson:    'hawks_left_corr.json',
        rightJson:   'hawks_right_corr.json',
        contoursJson:['NBA_court.json'],
        maskUrl:     'hawks_mask_tb.png',
      },
      tennis: {
        label:       'Tennis / Intennse',
        videoUrl:    'https://meta-spatial-vids-dev.spatial.quintar.ai/IN0003/zcam/20260710/40mb/5/index.m3u8',
        leftJson:    'tennis2-L-rectified_corr.json',
        rightJson:   'tennis2-R-rectified_corr.json',
        contoursJson:['tennis_court_contours_net.json'],
        maskUrl:     'intennse_mask_tb.png',
      },
      matcat: {
        label:       'Tennis / Mat Cat',
        videoUrl:    'https://streams.quintar.ai/wayne/tennis_mat_cat_tb.mp4',
        leftJson:    'tennis_mat_cat_L_corr.json',
        rightJson:   'tennis_mat_cat_R_corr.json',
        contoursJson:['tennis_court_contours_net.json'],
        maskUrl:     '',
        // Real ATP match tracking data (unrelated footage) overlaid on this
        // court using the same registration/warp as the contour lines —
        // see loadTennisMatchOverlay().
        matchDataUrl:'sample_tennis_data_v4.json',
      },
    };

    let selectedExp = null;   // key into EXPERIENCES set when user picks
    let hlsPlayer   = null;   // hls.js instance when the active experience streams HLS

    // Pre-loaded per-experience registration data (populated on page load).
    const regDataMap = {};    // key → { pitch, d, fopScale, invFopL, invFopR, qw, qh }

    // Registration params set once JSON loads; used when AR session starts.
    let regPitch    = null;   // radians
    let regD        = 1.0;    // metres to screen
    let regFopScale = null;   // fop_to_room_scale (feet → room metres)
    let regInvPfopL = null;   // inverse of left FOP camera pose (THREE.Matrix4)
    let regInvPfopR = null;   // inverse of right FOP camera pose (THREE.Matrix4)

    // Field contour preview transform (non-AR and on exit): 1 ft = 5 mm miniature
    const FIELD_PREVIEW_POS   = new THREE.Vector3(0, 1.5, -1.5);
    const FIELD_PREVIEW_QUAT  = new THREE.Quaternion();
    const FIELD_PREVIEW_SCALE = new THREE.Vector3(0.005, 0.005, 0.005);

    // Per-eye field meshes — created once, updated by placeScreenAtHead
    let leftFieldMesh  = null;   // Three.js layer 1 in AR (left eye only)
    let rightFieldMesh = null;   // Three.js layer 2 in AR (right eye only)

    // ── 3D AR menu state ──────────────────────────────────────────────────────
    let arMenuGroup        = null;   // Three.Group placed in world space in AR
    let menuContoursOn     = true;   // current toggle state
    let contoursHitTarget  = null;   // invisible mesh for raycasting
    let contoursToggleMesh = null;   // visible toggle button (texture swapped on toggle)
    let xrSelectHandler    = null;   // stored so we can removeEventListener on exit

    // Billboard / height-follow — UI toggle state only (math lives in WASM)
    let menuBillboardOn        = false;
    let billboardToggleMesh    = null;
    let billboardHitTarget     = null;
    let menuHeightFollowOn     = false;
    let heightFollowToggleMesh = null;
    let heightFollowHitTarget  = null;
    // menuFullTrailOn declared with the other tennis-data state, above
    let fullTrailToggleMesh    = null;
    let fullTrailHitTarget     = null;

    // ── WASM spatial-math module ──────────────────────────────────────────────
    //
    // The per-eye field-contour warp transform (z-shear warp, FOP→room, billboard
    // and height-follow updates) is computed inside a WebAssembly module to keep
    // the implementation opaque.  The module is loaded asynchronously; if it has
    // not finished loading by the time AR starts the contours simply won't appear.
    //
    let spatialMath    = null;   // SpatialMath instance (from wasm/pkg/)
    let wasmFieldReady = false;  // true once spatialMath.place_screen() has been called
    let regPending     = null;   // registration params buffered before WASM loads

    function applyRegistrationToWasm() {
      if (!spatialMath || !regPending) return;
      spatialMath.set_registration(
        regPending.scale,
        regPending.invFopL,
        regPending.invFopR,
        regPending.d
      );
      regPending = null;
      console.log('[wasm] registration applied');
    }

    // Dynamic import works in non-module scripts on modern Chrome.
    import('./wasm/pkg/spatial_math.js').then(async mod => {
      await mod.default();          // initialise / fetch the .wasm binary
      spatialMath = new mod.SpatialMath();
      applyRegistrationToWasm();    // catch up if JSON already loaded
      console.log('[wasm] spatial_math ready');
    }).catch(e => console.error('[wasm] failed to load spatial_math:', e));

    // ─── 3D AR Menu ──────────────────────────────────────────────────────────
    //
    // A flat panel rendered as Three.js geometry in world space.
    // All meshes: depthTest:false, renderOrder:3 — always visible over contours.
    // Interaction: gaze ray (camera -Z) + XR 'select' event (trigger / pinch / tap).
    //

    // Render text onto a canvas and return a CanvasTexture.
    function makeMenuTexture(text, cw, ch, opts = {}) {
      const canvas = document.createElement('canvas');
      canvas.width = cw; canvas.height = ch;
      const ctx = canvas.getContext('2d');
      if (opts.bg) { ctx.fillStyle = opts.bg; ctx.fillRect(0, 0, cw, ch); }
      else          { ctx.clearRect(0, 0, cw, ch); }
      ctx.fillStyle    = opts.color || '#ffffff';
      ctx.font         = `${opts.bold ? '700 ' : ''}${opts.size || 26}px system-ui, sans-serif`;
      ctx.textAlign    = opts.align || 'center';
      ctx.textBaseline = 'middle';
      const tx = opts.align === 'left' ? 14 : (opts.align === 'right' ? cw - 14 : cw / 2);
      ctx.fillText(text, tx, ch / 2);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.NoColorSpace;
      return tex;
    }

    // Shared material factory for menu meshes.
    function menuMat(overrides = {}) {
      return new THREE.MeshBasicMaterial({
        transparent: true, depthTest: false, depthWrite: false,
        side: THREE.DoubleSide, ...overrides
      });
    }

    // Draw a rounded-rectangle path into ctx.
    function _roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + r,     r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x,     y + h, x,     y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x,     y,     x + r, y,         r);
      ctx.closePath();
    }

    // Pill-shaped ON/OFF toggle button texture.
    function makeToggleTex(on) {
      const tw = 160, th = 70;
      const canvas = document.createElement('canvas');
      canvas.width = tw; canvas.height = th;
      const ctx = canvas.getContext('2d');
      _roundRect(ctx, 3, 3, tw - 6, th - 6, (th - 6) / 2);
      ctx.fillStyle = on ? '#0070f3' : '#3a3a50';
      ctx.fill();
      ctx.fillStyle = on ? '#ffffff' : '#aaaaaa';
      ctx.font = '700 28px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(on ? 'ON' : 'OFF', tw / 2, th / 2);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.NoColorSpace;
      return tex;
    }

    function buildArMenu() {
      arMenuGroup = new THREE.Group();
      arMenuGroup.visible = false;

      const W = 0.44, H = 0.36;
      const RO = 3;

      // ── Panel background — rounded corners via canvas texture ──────────────
      const bgCW = 512, bgCH = Math.round(bgCW * H / W);
      const bgCanvas = document.createElement('canvas');
      bgCanvas.width = bgCW; bgCanvas.height = bgCH;
      const bgCtx = bgCanvas.getContext('2d');
      _roundRect(bgCtx, 3, 3, bgCW - 6, bgCH - 6, 36);
      bgCtx.fillStyle = '#0d0d16';
      bgCtx.fill();
      bgCtx.strokeStyle = 'rgba(110, 120, 180, 0.55)';
      bgCtx.lineWidth = 4;
      bgCtx.stroke();
      const bgTex = new THREE.CanvasTexture(bgCanvas);
      bgTex.colorSpace = THREE.NoColorSpace;
      const bg = new THREE.Mesh(new THREE.PlaneGeometry(W, H), menuMat({ map: bgTex }));
      bg.renderOrder = RO;
      arMenuGroup.add(bg);

      // ── Title ──────────────────────────────────────────────────────────────
      const title = new THREE.Mesh(new THREE.PlaneGeometry(W * 0.86, 0.044),
        menuMat({ map: makeMenuTexture('Spatial Video Options', 480, 70,
          { color: '#e8e8ff', size: 28, bold: true }) }));
      title.position.set(0, H / 2 - 0.042, 0.001);
      title.renderOrder = RO;
      arMenuGroup.add(title);

      // ── Divider ────────────────────────────────────────────────────────────
      const div = new THREE.Mesh(new THREE.PlaneGeometry(W * 0.84, 0.0015),
        menuMat({ color: 0x445577, opacity: 0.9 }));
      div.position.set(0, H / 2 - 0.090, 0.001);
      div.renderOrder = RO;
      arMenuGroup.add(div);

      // ── Row factory ────────────────────────────────────────────────────────
      // Each row: left-aligned label + pill toggle button + invisible hit target.
      function addRow(labelText, y, initialOn) {
        const lbl = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.042),
          menuMat({ map: makeMenuTexture(labelText, 340, 62,
            { color: '#c8c8dc', size: 22 }) }));
        lbl.position.set(-0.055, y, 0.001);
        lbl.renderOrder = RO;
        arMenuGroup.add(lbl);

        const btn = new THREE.Mesh(new THREE.PlaneGeometry(0.112, 0.050),
          menuMat({ map: makeToggleTex(initialOn) }));
        btn.position.set(0.140, y, 0.002);
        btn.renderOrder = RO;
        arMenuGroup.add(btn);

        const hit = new THREE.Mesh(new THREE.PlaneGeometry(0.20, 0.10),
          new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide,
            depthTest: false }));
        hit.position.copy(btn.position);
        hit.renderOrder = RO;
        arMenuGroup.add(hit);

        return { btn, hit };
      }

      const r1 = addRow('Show contours',  0.028, menuContoursOn);
      contoursToggleMesh = r1.btn; contoursHitTarget = r1.hit;

      const r2 = addRow('Billboarding',  -0.026, menuBillboardOn);
      billboardToggleMesh = r2.btn; billboardHitTarget = r2.hit;

      const r3 = addRow('Height follow', -0.080, menuHeightFollowOn);
      heightFollowToggleMesh = r3.btn; heightFollowHitTarget = r3.hit;
